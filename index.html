<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Snake Neon Ultra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --clr: #00ff44; --bg: #050805; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: #000; color: #fff; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; height: 100dvh; overflow: hidden; touch-action: none;
        }

        /* Декор фона */
        body::before {
            content: ""; position: absolute; width: 150%; height: 150%;
            background: radial-gradient(circle, rgba(0,255,68,0.05) 0%, transparent 70%);
            z-index: -1; animation: pulseBg 8s infinite alternate;
        }
        @keyframes pulseBg { from { transform: scale(1); } to { transform: scale(1.2); } }

        #ui-layer { width: 100%; max-width: 400px; padding: 15px; z-index: 10; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .tabs { display: flex; background: #111; border-radius: 12px; padding: 4px; border: 1px solid #222; }
        .tabs button {
            padding: 8px 16px; background: transparent; border: none; color: #555;
            font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 8px;
        }
        .tabs button.active { background: var(--clr); color: #000; box-shadow: 0 0 10px var(--clr); }

        /* Игровое поле */
        #game-area { position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        canvas { 
            display: block; border: 2px solid #222; border-radius: 15px; 
            background: rgba(5, 8, 5, 0.9);
        }

        #stats-bar {
            display: flex; justify-content: space-between; width: 100%;
            padding: 10px; font-family: monospace; font-size: 18px; color: var(--clr);
            text-shadow: 0 0 5px var(--clr);
        }

        /* Управление */
        #controls {
            display: grid; grid-template-areas: ". up ." "left . right" ". down .";
            gap: 15px; margin-top: 20px;
        }
        .btn-dir {
            width: 70px; height: 70px; background: rgba(20,20,20,0.8); border: 1px solid #333;
            color: #fff; font-size: 24px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }
        .btn-dir:active { background: var(--clr); color: #000; border-color: #fff; transform: scale(0.95); }

        /* Оверлей меню */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; backdrop-filter: blur(10px);
        }
        .title-neon { 
            font-size: 60px; color: var(--clr); text-shadow: 0 0 20px var(--clr);
            margin-bottom: 30px; font-weight: 900; font-style: italic;
        }
        .btn-play {
            padding: 20px 70px; background: var(--clr); color: #000; border: none;
            font-size: 24px; font-weight: bold; border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,255,68,0.5); cursor: pointer;
        }

        /* Топ */
        #top-list {
            display: none; width: 100%; max-width: 350px; padding: 20px;
            height: 60vh; overflow-y: auto;
        }
        .top-item {
            display: flex; justify-content: space-between; padding: 15px;
            background: rgba(255,255,255,0.05); margin-bottom: 10px; border-radius: 12px;
            border-left: 5px solid var(--clr); animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="header">
        <div class="tabs">
            <button id="t-game" class="active" onclick="switchTab('game')">ИГРА</button>
            <button id="t-top" onclick="switchTab('top')">ЛИДЕРЫ</button>
        </div>
        <div style="font-size: 20px;">🐍</div>
    </div>

    <div id="main-view">
        <div id="stats-bar">
            <div>SCORE: <span id="s-cur">0</span></div>
            <div>BEST: <span id="s-best">0</span></div>
        </div>
        <div id="game-area">
            <canvas id="c"></canvas>
        </div>
        <div id="controls">
            <div class="btn-dir" style="grid-area:up" onpointerdown="move(0,-1)">▲</div>
            <div class="btn-dir" style="grid-area:left" onpointerdown="move(-1,0)">◀</div>
            <div class="btn-dir" style="grid-area:right" onpointerdown="move(1,0)">▶</div>
            <div class="btn-dir" style="grid-area:down" onpointerdown="move(0,1)">▼</div>
        </div>
    </div>

    <div id="top-list"></div>
</div>

<div id="overlay">
    <h1 class="title-neon">SNAKE</h1>
    <button class="btn-play" onclick="start()">ИГРАТЬ</button>
</div>

<script>
const tg = window.Telegram?.WebApp;
if(tg) { tg.ready(); tg.expand(); if(tg.disableVerticalSwipes) tg.disableVerticalSwipes(); }

const API = "https://f141608d-1c6f-48a7-b475-76bfe617af45-00-bg39mkj1p2mv.sisko.replit.dev/api";
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const COLS = 20;

let CELL, alive = false, score = 0, best = localStorage.getItem('snk_hi') || 0;
let snake = [], prevSnake = [], food = {x:7, y:7}, particles = [];
let curD = {x:1, y:0}, nextD = {x:1, y:0};
let lastT = 0, tickMs = 130;

function resize() {
    const size = Math.min(window.innerWidth - 40, window.innerHeight - 380, 400);
    CELL = Math.floor(size / COLS);
    canvas.width = canvas.height = CELL * COLS;
}

function start() {
    document.getElementById('overlay').style.display = 'none';
    score = 0; alive = true; 
    curD = {x:1, y:0}; nextD = {x:1, y:0};
    snake = [{x:10, y:10}, {x:9, y:10}, {x:8, y:10}];
    prevSnake = JSON.parse(JSON.stringify(snake));
    document.getElementById('s-cur').textContent = "0";
    spawnFood();
    lastT = performance.now();
    requestAnimationFrame(loop);
}

function spawnFood() {
    food = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*COLS) };
    if(snake.some(s=>s.x===food.x && s.y===food.y)) spawnFood();
}

function move(x, y) {
    if (x !== -curD.x || y !== -curD.y) nextD = {x, y};
    if(tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
}

function loop(t) {
    if(!alive) return;
    requestAnimationFrame(loop);
    const dt = t - lastT;
    let p = Math.min(dt / tickMs, 1);

    if (dt >= tickMs) {
        prevSnake = JSON.parse(JSON.stringify(snake));
        curD = nextD;
        const head = { x: snake[0].x + curD.x, y: snake[0].y + curD.y };

        if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= COLS || snake.some(s=>s.x===head.x && s.y===head.y)) {
            alive = false; return die();
        }

        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
            score++;
            document.getElementById('s-cur').textContent = score;
            tg?.HapticFeedback?.impactOccurred('medium');
            createParticles(food.x * CELL + CELL/2, food.y * CELL + CELL/2);
            spawnFood();
        } else { snake.pop(); }
        lastT = t; p = 0;
    }
    render(p);
}

function createParticles(x, y) {
    for(let i=0; i<8; i++) particles.push({x, y, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, life: 1});
}

function render(p) {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    
    // Сетка (неоновая)
    ctx.strokeStyle = "rgba(0, 255, 68, 0.05)";
    ctx.lineWidth = 1;
    for(let i=0; i<=COLS; i++) {
        ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i*CELL); ctx.lineTo(canvas.width, i*CELL); ctx.stroke();
    }

    // Еда
    const fx = food.x * CELL + CELL/2;
    const fy = food.y * CELL + CELL/2;
    ctx.shadowBlur = 15; ctx.shadowColor = "#ff3355";
    ctx.fillStyle = "#ff3355";
    ctx.beginPath();
    ctx.arc(fx, fy, CELL/2.5 + Math.sin(Date.now()/100)*2, 0, Math.PI*2);
    ctx.fill();

    // Частицы
    particles.forEach((pt, i) => {
        ctx.fillStyle = `rgba(0, 255, 68, ${pt.life})`;
        ctx.fillRect(pt.x, pt.y, 2, 2);
        pt.x += pt.vx; pt.y += pt.vy; pt.life -= 0.05;
        if(pt.life <= 0) particles.splice(i, 1);
    });

    // Змейка
    ctx.shadowBlur = 10; ctx.shadowColor = "#00ff44";
    snake.forEach((s, i) => {
        const prev = prevSnake[i] || s;
        const x = (prev.x + (s.x - prev.x) * p) * CELL;
        const y = (prev.y + (s.y - prev.y) * p) * CELL;
        
        const grad = ctx.createLinearGradient(x, y, x+CELL, y+CELL);
        grad.addColorStop(0, i === 0 ? "#00ff44" : "#008833");
        grad.addColorStop(1, i === 0 ? "#00cc33" : "#004411");
        
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(x+2, y+2, CELL-4, CELL-4, 5);
        ctx.fill();
    });
    ctx.shadowBlur = 0;
}

function die() {
    if(score > best) { best = score; localStorage.setItem('snk_hi', best); document.getElementById('s-best').textContent = best; }
    tg?.HapticFeedback?.notificationOccurred('error');
    document.getElementById('overlay').style.display = 'flex';
    if(tg?.initData) {
        fetch(`${API}/score`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({init_data: tg.initData, score: score})
        }).catch(e => {});
    }
}

function switchTab(t) {
    document.getElementById('main-view').style.display = t === 'game' ? 'block' : 'none';
    document.getElementById('top-list').style.display = t === 'top' ? 'block' : 'none';
    document.getElementById('t-game').className = t === 'game' ? 'active' : '';
    document.getElementById('t-top').className = t === 'top' ? 'active' : '';
    if(t === 'top') loadTop();
}

async function loadTop() {
    const list = document.getElementById('top-list');
    list.innerHTML = '<p style="text-align:center; opacity:0.5;">Загрузка неоновой базы...</p>';
    try {
        const res = await fetch(`${API}/leaderboard`);
        const data = await res.json();
        list.innerHTML = '<h2 style="color:var(--clr); margin-bottom:20px; text-align:center;">GLOBAL TOP</h2>';
        data.forEach(r => {
            const isMe = tg?.initDataUnsafe?.user?.id && String(r.user_id) === String(tg.initDataUnsafe.user.id);
            list.innerHTML += `<div class="top-item ${isMe?'me':''}"><span>${r.rank}. ${r.name}</span><b>${r.score}</b></div>`;
        });
    } catch(e) { 
        list.innerHTML = '<h2 style="text-align:center">SERVER OFFLINE</h2><p style="text-align:center; opacity:0.5">Но твой рекорд сохранен локально!</p>'; 
    }
}

// Управление свайпами
let sx, sy;
document.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, {passive:false});
document.addEventListener('touchmove', e => {
    if(!sx || !sy) return;
    const dx = e.touches[0].clientX - sx, dy = e.touches[0].clientY - sy;
    if(Math.abs(dx)>30 || Math.abs(dy)>30) {
        if(Math.abs(dx)>Math.abs(dy)) move(dx>0?1:-1, 0);
        else move(0, dy>0?1:-1);
        sx = sy = null;
    }
    e.preventDefault();
}, {passive:false});

resize();
document.getElementById('s-best').textContent = best;
window.addEventListener('resize', resize);
</script>
</body>
</html>
