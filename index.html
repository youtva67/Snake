<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Snake Ultimate TWA</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { --clr: #0f4; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      background: #000; color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; height: 100dvh; overflow: hidden; touch-action: none;
    }

    /* Панель управления (Верх) */
    #top-bar {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; max-width: 400px; padding: 15px; z-index: 10;
    }
    #tabs { display: flex; flex: 1; background: #1a1a1a; border-radius: 12px; padding: 3px; margin-right: 10px; }
    #tabs button {
      flex: 1; padding: 10px; background: transparent; border: none; color: #666;
      font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 9px; transition: 0.2s;
    }
    #tabs button.active { background: var(--clr); color: #000; }
    
    .theme-dots { display: flex; gap: 8px; }
    .theme-dot { width: 24px; height: 24px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
    .theme-dot.active { border-color: #fff; transform: scale(1.1); }

    /* Статистика */
    #scoreboard {
      display: flex; justify-content: space-around; width: 100%; max-width: 400px;
      margin-bottom: 10px; font-weight: bold; font-family: monospace;
    }
    #score-val { color: var(--clr); font-size: 20px; }
    #timer-val { color: #ff0; display: none; }

    /* Канвас */
    #game-container { position: relative; }
    canvas {
      display: block; border: 3px solid var(--clr); border-radius: 12px;
      background: #050505; box-shadow: 0 0 25px rgba(0,0,0,0.5);
    }

    /* Кнопки */
    #controls {
      display: grid; grid-template-areas: ". up ." "left . right" ". down .";
      gap: 12px; margin-top: 20px;
    }
    .btn-ctrl {
      width: 72px; height: 72px; background: #111; border: 2px solid #333;
      color: #fff; font-size: 28px; border-radius: 18px; display: flex;
      align-items: center; justify-content: center; cursor: pointer;
    }
    .btn-ctrl:active { background: var(--clr); color: #000; border-color: #fff; }

    /* Экраны */
    #overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; text-align: center; padding: 20px;
    }
    .title { font-size: 48px; color: var(--clr); margin-bottom: 10px; letter-spacing: 5px; }
    .mode-select { display: flex; gap: 10px; margin: 20px 0; }
    .btn-mode {
      padding: 10px 15px; border: 1px solid #444; background: #111; color: #888;
      border-radius: 8px; font-size: 12px; cursor: pointer;
    }
    .btn-mode.active { border-color: var(--clr); color: var(--clr); }
    
    .btn-start {
      padding: 18px 60px; background: var(--clr); color: #000; border: none;
      font-size: 22px; font-weight: bold; border-radius: 15px; cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,255,68,0.3);
    }

    #leaderboard {
      display: none; width: 100%; max-width: 360px; height: 60vh;
      overflow-y: auto; padding: 10px;
    }
    .lb-item {
      display: flex; justify-content: space-between; padding: 12px;
      background: #111; margin-bottom: 8px; border-radius: 10px; border-left: 4px solid var(--clr);
    }
    .lb-me { border: 1px solid #ff0; background: #1a1a00; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="top-bar">
  <div id="tabs">
    <button id="tab-game-btn" class="active" onclick="switchTab('game')">ИГРА</button>
    <button id="tab-lb-btn" onclick="switchTab('lb')">ЛИДЕРЫ</button>
  </div>
  <div class="theme-dots">
    <div class="theme-dot active" style="background:#0f4" data-theme="matrix" onclick="changeTheme('matrix')"></div>
    <div class="theme-dot" style="background:#d0f" data-theme="neon" onclick="changeTheme('neon')"></div>
  </div>
</div>

<div id="game-ui">
  <div id="scoreboard">
    <div>СЧЕТ: <span id="score-val">0</span></div>
    <div id="timer-val">00:60</div>
    <div>РЕКОРД: <span id="best-val">0</span></div>
  </div>
  
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>
  </div>

  <div id="controls">
    <div class="btn-ctrl" style="grid-area:up" onpointerdown="input(0,-1)">▲</div>
    <div class="btn-ctrl" style="grid-area:left" onpointerdown="input(-1,0)">◀</div>
    <div class="btn-ctrl" style="grid-area:right" onpointerdown="input(1,0)">▶</div>
    <div class="btn-ctrl" style="grid-area:down" onpointerdown="input(0,1)">▼</div>
  </div>
</div>

<div id="leaderboard"></div>

<div id="overlay">
  <h1 class="title">SNAKE</h1>
  <p id="last-res" style="margin-bottom:10px; font-size:18px;"></p>
  
  <div class="mode-select">
    <button id="m-classic" class="btn-mode active" onclick="setMode('classic')">КЛАССИКА</button>
    <button id="m-blitz" class="btn-mode" onclick="setMode('blitz')">БЛИЦ (60с)</button>
  </div>

  <button class="btn-start" onclick="initGame()">ИГРАТЬ</button>
</div>

<script>
/** ИНИЦИАЛИЗАЦИЯ TG **/
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.enableClosingConfirmation();
  if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
}

/** КОНФИГ И ПЕРЕМЕННЫЕ **/
const API = "https://f141608d-1c6f-48a7-b475-76bfe617af45-00-bg39mkj1p2mv.sisko.replit.dev/api";
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const COLS = 20;

let CELL, alive = false, score = 0, best = localStorage.getItem('snake_best') || 0;
let snake = [], prevSnake = [], food = {x: 5, y: 5};
let curDir = {x: 1, y: 0}, nextDir = {x: 1, y: 0};
let lastTick = 0, tickMs = 140, mode = 'classic', timer = 60;
let themes = {
  matrix: { bg: "#050805", clr: "#0f4", food: "#f35" },
  neon: { bg: "#080010", clr: "#d0f", food: "#ff0" }
};
let curTheme = 'matrix';

/** СИСТЕМА УПРАВЛЕНИЯ **/
function input(x, y) {
  if (x !== -curDir.x || y !== -curDir.y) nextDir = {x, y};
  if (tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
}

function setMode(m) {
  mode = m;
  document.getElementById('m-classic').classList.toggle('active', m === 'classic');
  document.getElementById('m-blitz').classList.toggle('active', m === 'blitz');
}

function changeTheme(t) {
  curTheme = t;
  document.documentElement.style.setProperty('--clr', themes[t].clr);
  document.querySelectorAll('.theme-dot').forEach(d => d.classList.toggle('active', d.dataset.theme === t));
  if (!alive) draw(1);
}

/** ЛОГИКА ИГРЫ **/
function resize() {
  const size = Math.min(window.innerWidth - 40, window.innerHeight - 380, 400);
  CELL = Math.floor(size / COLS);
  canvas.width = canvas.height = CELL * COLS;
  if (!alive) draw(1);
}

function spawnFood() {
  food = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * COLS) };
  if (snake.some(s => s.x === food.x && s.y === food.y)) spawnFood();
}

function initGame() {
  document.getElementById('overlay').style.display = 'none';
  alive = true;
  score = 0;
  timer = 60;
  curDir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
  prevSnake = JSON.parse(JSON.stringify(snake));
  spawnFood();
  
  document.getElementById('score-val').textContent = "0";
  const tEl = document.getElementById('timer-val');
  if (mode === 'blitz') {
    tEl.style.display = 'block';
    const tInterval = setInterval(() => {
      if (!alive) { clearInterval(tInterval); return; }
      timer--;
      tEl.textContent = `00:${timer < 10 ? '0' : ''}${timer}`;
      if (timer <= 0) gameOver();
    }, 1000);
  } else { tEl.style.display = 'none'; }

  lastTick = performance.now();
  requestAnimationFrame(loop);
}

function loop(t) {
  if (!alive) return;
  requestAnimationFrame(loop);

  const delta = t - lastTick;
  let progress = delta / tickMs;

  if (delta >= tickMs) {
    prevSnake = JSON.parse(JSON.stringify(snake));
    curDir = nextDir;
    const head = { x: snake[0].x + curDir.x, y: snake[0].y + curDir.y };

    // Коллизии
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= COLS || 
        snake.some(s => s.x === head.x && s.y === head.y)) {
      return gameOver();
    }

    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score++;
      document.getElementById('score-val').textContent = score;
      if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
      spawnFood();
    } else {
      snake.pop();
    }
    lastTick = t;
    progress = 0;
  }
  draw(progress);
}

function draw(p) {
  const t = themes[curTheme];
  ctx.fillStyle = t.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Сетка
  ctx.strokeStyle = "rgba(255,255,255,0.02)";
  for(let i=0; i<=COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i*CELL); ctx.lineTo(canvas.width, i*CELL); ctx.stroke();
  }

  // Еда
  ctx.fillStyle = t.food;
  const pulse = Math.sin(Date.now() / 150) * 2;
  ctx.beginPath();
  ctx.arc(food.x*CELL + CELL/2, food.y*CELL + CELL/2, CELL/2.5 + pulse, 0, Math.PI*2);
  ctx.fill();

  // Змейка (Интерполяция)
  snake.forEach((s, i) => {
    const prev = prevSnake[i] || s;
    const x = (prev.x + (s.x - prev.x) * p) * CELL;
    const y = (prev.y + (s.y - prev.y) * p) * CELL;
    
    ctx.fillStyle = i === 0 ? t.clr : t.clr + "AA";
    // Рисуем скругленные сегменты через fillRect (совместимо со всеми)
    ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
  });
}

function gameOver() {
  alive = false;
  if (score > best) {
    best = score;
    localStorage.setItem('snake_best', best);
    document.getElementById('best-val').textContent = best;
  }
  document.getElementById('last-res').textContent = `РЕЗУЛЬТАТ: ${score}`;
  document.getElementById('overlay').style.display = 'flex';
  if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');

  // Отправка
  if (tg?.initData) {
    fetch(`${API}/score`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ init_data: tg.initData, score: score })
    }).catch(e => console.error(e));
  }
}

/** ВКЛАДКИ И ЛИДЕРБОРД **/
function switchTab(tab) {
  document.getElementById('game-ui').style.display = tab === 'game' ? 'flex' : 'none';
  document.getElementById('leaderboard').style.display = tab === 'lb' ? 'block' : 'none';
  document.getElementById('tab-game-btn').className = tab === 'game' ? 'active' : '';
  document.getElementById('tab-lb-btn').className = tab === 'lb' ? 'active' : '';
  if (tab === 'lb') loadLB();
}

async function loadLB() {
  const container = document.getElementById('leaderboard');
  container.innerHTML = '<p style="text-align:center">Загрузка данных...</p>';
  try {
    const res = await fetch(`${API}/leaderboard`);
    const data = await res.json();
    container.innerHTML = '<h2 style="text-align:center; margin-bottom:20px;">ТОП ИГРОКОВ</h2>';
    const myId = tg?.initDataUnsafe?.user?.id;
    data.forEach(r => {
      const isMe = myId && String(r.user_id) === String(myId);
      container.innerHTML += `
        <div class="lb-item ${isMe ? 'lb-me' : ''}">
          <span>${r.rank}. ${r.name} ${isMe ? '(ВЫ)' : ''}</span>
          <b>${r.score}</b>
        </div>`;
    });
  } catch (e) { container.innerHTML = '<p>Ошибка связи с сервером</p>'; }
}

/** ТАЧ И ИВЕНТЫ **/
let startX, startY;
document.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
}, {passive: false});

document.addEventListener('touchmove', e => {
  if (!startX || !startY) return;
  const dx = e.touches[0].clientX - startX;
  const dy = e.touches[0].clientY - startY;
  if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
    if (Math.abs(dx) > Math.abs(dy)) input(dx > 0 ? 1 : -1, 0);
    else input(0, dy > 0 ? 1 : -1);
    startX = startY = null;
  }
  e.preventDefault();
}, {passive: false});

window.addEventListener('resize', resize);
document.getElementById('best-val').textContent = best;
resize();
</script>

</body>
</html>
