<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Snake Ultimate Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --clr: #0f4; --bg: #050805; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body {
            background: #000; color: #fff; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100dvh; overflow: hidden; touch-action: none;
        }

        /* HEADER */
        #header { width: 100%; max-width: 420px; padding: 15px; z-index: 2000; }
        .tabs { display: flex; background: #111; border-radius: 12px; padding: 3px; border: 1px solid #333; }
        .tab { flex: 1; padding: 10px; border: none; background: transparent; color: #555; font-size: 12px; font-weight: bold; border-radius: 10px; transition: 0.3s; }
        .tab.active { background: var(--clr); color: #000; }

        /* GAME UI */
        #game-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        #hud { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 400px; padding: 10px 20px; color: var(--clr); font-family: monospace; font-size: 18px; }
        .p-btn { background: #222; border: 1px solid #444; color: #fff; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        
        canvas { display: block; border-radius: 15px; background: var(--bg); border: 2px solid #1a1a1a; }

        /* CONTROLS */
        #joy { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 12px; margin-top: 20px; }
        .btn { width: 70px; height: 70px; background: #111; border: 1px solid #333; color: #fff; font-size: 26px; border-radius: 22px; display: flex; align-items: center; justify-content: center; }
        .btn:active { background: var(--clr); color: #000; }

        /* MENU OVERLAY */
        #menu {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1500; backdrop-filter: blur(10px); text-align: center;
        }

        /* SKINS */
        .skin-list { display: flex; gap: 12px; margin: 20px 0; }
        .skin { width: 50px; height: 50px; border-radius: 12px; border: 2px solid #333; transition: 0.3s; }
        .skin.active { border-color: #fff; transform: scale(1.15); box-shadow: 0 0 15px rgba(255,255,255,0.3); }

        .m-sel { display: flex; gap: 10px; margin-bottom: 30px; }
        .m-btn { padding: 12px 20px; background: #111; border: 1px solid #444; color: #777; border-radius: 10px; font-weight: bold; }
        .m-btn.active { border-color: var(--clr); color: var(--clr); }

        .go-btn { padding: 20px 80px; background: var(--clr); color: #000; border: none; font-size: 24px; font-weight: 900; border-radius: 20px; box-shadow: 0 0 30px rgba(0,255,68,0.3); }

        /* LEADERBOARD */
        #top-list { width: 100%; max-width: 400px; padding: 20px; height: 75vh; overflow-y: auto; }
        .rank-row { display: flex; justify-content: space-between; padding: 15px; background: #0f0f0f; margin-bottom: 8px; border-radius: 12px; border-left: 4px solid var(--clr); }
        .rank-row.me { border: 1px solid #fff; background: #1a1a1a; }

        .hide { display: none !important; }
    </style>
</head>
<body>

<div id="header">
    <div class="tabs">
        <button id="nav-game" class="tab active" onclick="changeTab('game')">ИГРА</button>
        <button id="nav-top" class="tab" onclick="changeTab('top')">ТОП 10</button>
    </div>
</div>

<div id="game-section">
    <div id="hud">
        <div class="p-btn" onclick="togglePause()">⏸</div>
        <div id="score">0</div>
        <div id="timer" style="display:none; color:#ff0">60s</div>
        <div style="font-size:12px; opacity:0.5">РЕКОРД: <span id="best">0</span></div>
    </div>
    <canvas id="stage"></canvas>
    <div id="joy">
        <div class="btn" style="grid-area:up" onpointerdown="input(0,-1)">▲</div>
        <div class="btn" style="grid-area:left" onpointerdown="input(-1,0)">◀</div>
        <div class="btn" style="grid-area:right" onpointerdown="input(1,0)">▶</div>
        <div class="btn" style="grid-area:down" onpointerdown="input(0,1)">▼</div>
    </div>
</div>

<div id="top-section" class="hide">
    <div id="top-list"></div>
</div>

<div id="menu">
    <h1 style="font-size: 50px; color: var(--clr); margin-bottom: 10px; text-shadow: 0 0 20px var(--clr);">SNAKE</h1>
    <p id="status-text" style="color:#555; margin-bottom: 20px; font-weight: bold;">ВЫБЕРИТЕ РЕЖИМ И СКИН</p>
    
    <div class="skin-list">
        <div class="skin active" style="background:#0f4" data-s="neon" onclick="pickSkin('neon')"></div>
        <div class="skin" style="background:#0cf" data-s="cyber" onclick="pickSkin('cyber')"></div>
        <div class="skin" style="background:#ff0" data-s="gold" onclick="pickSkin('gold')"></div>
        <div class="skin" style="background:linear-gradient(45deg, #f0f, #00f)" data-s="rgb" onclick="pickSkin('rgb')"></div>
    </div>

    <div class="m-sel">
        <button id="mode-c" class="m-btn active" onclick="pickMode('classic')">КЛАССИКА</button>
        <button id="mode-b" class="m-btn" onclick="pickMode('blitz')">БЛИЦ 60с</button>
    </div>

    <button class="go-btn" onclick="start()">ИГРАТЬ</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand(); if(tg.disableVerticalSwipes) tg.disableVerticalSwipes();

const API = "https://f141608d-1c6f-48a7-b475-76bfe617af45-00-bg39mkj1p2mv.sisko.replit.dev/api";
const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d");
const G = 20;

let cSize, isAlive = false, isPaused = false, score = 0, hi = localStorage.getItem('snk_hi') || 0;
let snake = [], ghost = [], food = {x:5,y:5}, fx = [], currentTab = 'game';
let dir = {x:1,y:0}, next = {x:1,y:0}, mode = 'classic', time = 60;
let last = 0, speed = 135, skin = 'neon';

const skinKit = {
    neon: { h: '#0f4', b: 'rgba(0,255,68,0.4)', g: '#0f4' },
    cyber: { h: '#0cf', b: 'rgba(0,204,255,0.4)', g: '#0cf' },
    gold: { h: '#ff0', b: 'rgba(255,235,59,0.4)', g: '#ff0' },
    rgb: { h: '#f0f', b: 'rgba(255,0,255,0.4)', g: '#f0f' }
};

function pickSkin(s) {
    skin = s;
    document.querySelectorAll('.skin').forEach(el => el.classList.toggle('active', el.dataset.s === s));
    document.documentElement.style.setProperty('--clr', skinKit[s].h);
}

function pickMode(m) {
    mode = m;
    document.getElementById('mode-c').classList.toggle('active', m === 'classic');
    document.getElementById('mode-b').classList.toggle('active', m === 'blitz');
}

function changeTab(t) {
    currentTab = t;
    if(t === 'top') {
        if(isAlive) isPaused = true;
        document.getElementById('game-section').classList.add('hide');
        document.getElementById('top-section').classList.remove('hide');
        document.getElementById('menu').classList.add('hide'); // СКРЫВАЕМ МЕНЮ В ТОПЕ
        document.getElementById('nav-game').classList.remove('active');
        document.getElementById('nav-top').classList.add('active');
        loadTop();
    } else {
        document.getElementById('game-section').classList.remove('hide');
        document.getElementById('top-section').classList.add('hide');
        document.getElementById('nav-game').classList.add('active');
        document.getElementById('nav-top').classList.remove('active');
        if(!isAlive || isPaused) showMenu(); // ПОКАЗЫВАЕМ МЕНЮ, ЕСЛИ ИГРА НЕ ИДЕТ
    }
}

function showMenu() {
    if(currentTab === 'game') {
        document.getElementById('menu').classList.remove('hide');
        document.getElementById('status-text').textContent = isAlive ? "ИГРА НА ПАУЗЕ" : "ВЫБЕРИТЕ РЕЖИМ И СКИН";
    }
}

function togglePause() { if(isAlive) { isPaused = true; showMenu(); } }

function start() {
    document.getElementById('menu').classList.add('hide');
    if(isAlive && isPaused) { isPaused = false; last = performance.now(); requestAnimationFrame(loop); return; }
    
    score = 0; isAlive = true; isPaused = false; time = 60;
    dir = {x:1,y:0}; next = {x:1,y:0};
    snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    ghost = JSON.parse(JSON.stringify(snake));
    document.getElementById('score').textContent = "0";
    document.getElementById('timer').style.display = mode === 'blitz' ? 'block' : 'none';
    
    spawn();
    last = performance.now();
    requestAnimationFrame(loop);
}

function spawn() {
    food = { x: Math.floor(Math.random()*G), y: Math.floor(Math.random()*G) };
    if(snake.some(s=>s.x===food.x && s.y===food.y)) spawn();
}

function input(x, y) {
    if (x !== -dir.x || y !== -dir.y) next = {x, y};
    tg.HapticFeedback.selectionChanged();
}

function loop(ts) {
    if(!isAlive || isPaused || currentTab !== 'game') return;
    requestAnimationFrame(loop);
    const dt = ts - last;
    let p = Math.min(dt / speed, 1);

    if (dt >= speed) {
        ghost = JSON.parse(JSON.stringify(snake));
        dir = next;
        const h = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        if(mode === 'blitz') {
            time -= (speed/1000);
            document.getElementById('timer').textContent = Math.ceil(time) + 's';
            if(time <= 0) return die();
        }

        if (h.x<0 || h.x>=G || h.y<0 || h.y>=G || snake.some(s=>s.x===h.x && s.y===h.y)) return die();

        snake.unshift(h);
        if (h.x === food.x && h.y === food.y) {
            score++; document.getElementById('score').textContent = score;
            tg.HapticFeedback.impactOccurred('medium');
            for(let i=0;i<6;i++) fx.push({x:food.x*cSize+cSize/2, y:food.y*cSize+cSize/2, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5, a:1});
            spawn();
        } else { snake.pop(); }
        last = ts; p = 0;
    }
    draw(p);
}

function draw(p) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const s = skinKit[skin];

    // Food
    ctx.shadowBlur = 15; ctx.shadowColor = '#f35'; ctx.fillStyle = '#f35';
    ctx.beginPath(); ctx.arc(food.x*cSize+cSize/2, food.y*cSize+cSize/2, cSize/2.5, 0, Math.PI*2); ctx.fill();

    // Particles
    fx.forEach((pt, i) => {
        ctx.shadowBlur = 0; ctx.fillStyle = `rgba(0,255,68,${pt.a})`;
        ctx.fillRect(pt.x, pt.y, 2, 2);
        pt.x+=pt.vx; pt.y+=pt.vy; pt.a-=0.04;
        if(pt.a<=0) fx.splice(i,1);
    });

    // Snake
    ctx.shadowBlur = 10; ctx.shadowColor = s.g;
    snake.forEach((seg, i) => {
        const pr = ghost[i] || seg;
        const x = (pr.x + (seg.x - pr.x)*p)*cSize;
        const y = (pr.y + (seg.y - pr.y)*p)*cSize;
        ctx.fillStyle = (skin === 'rgb') ? `hsl(${(Date.now()/10 + i*15)%360}, 100%, 50%)` : (i === 0 ? s.h : s.b);
        ctx.beginPath(); ctx.roundRect(x+1, y+1, cSize-2, cSize-2, 6); ctx.fill();
    });
    ctx.shadowBlur = 0;
}

function die() {
    isAlive = false;
    if(score > hi) { hi = score; localStorage.setItem('snk_hi', hi); document.getElementById('best').textContent = hi; }
    tg.HapticFeedback.notificationOccurred('error');
    showMenu();
    if(tg.initData) fetch(`${API}/score`, { method: "POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({init_data: tg.initData, score: score}) }).catch(()=>{});
}

async function loadTop() {
    const l = document.getElementById('top-list');
    l.innerHTML = '<p style="text-align:center; opacity:0.5; margin-top:50px;">Загрузка...</p>';
    try {
        const res = await fetch(`${API}/leaderboard`);
        const data = await res.json();
        l.innerHTML = '<h2 style="text-align:center; margin-bottom:20px; color:var(--clr)">ТОП ЛИДЕРОВ</h2>';
        data.forEach(r => {
            const isMe = tg.initDataUnsafe?.user?.id && String(r.user_id) === String(tg.initDataUnsafe.user.id);
            l.innerHTML += `<div class="rank-row ${isMe?'me':''}"><span>${r.rank}. ${r.name}</span><b>${r.score}</b></div>`;
        });
    } catch(e) { l.innerHTML = '<p style="text-align:center">Сервер не отвечает</p>'; }
}

function resize() {
    const d = Math.min(window.innerWidth - 40, window.innerHeight - 380, 400);
    cSize = Math.floor(d / G);
    canvas.width = canvas.height = cSize * G;
}

let tx, ty;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:false});
document.addEventListener('touchmove', e => {
    if(!tx || !ty) return;
    const dx = e.touches[0].clientX - tx, dy = e.touches[0].clientY - ty;
    if(Math.abs(dx)>30 || Math.abs(dy)>30) {
        if(Math.abs(dx)>Math.abs(dy)) input(dx>0?1:-1, 0);
        else input(0, dy>0?1:-1);
        tx = ty = null;
    }
    e.preventDefault();
}, {passive:false});

resize();
document.getElementById('best').textContent = hi;
window.addEventListener('resize', resize);
</script>
</body>
</html>
