<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Snake Ultimate Neon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --clr-main: #00ff44;
            --clr-bg: #050805;
            --clr-accent: #ff3355;
            --shadow: 0 0 15px rgba(0, 255, 68, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #000;
            background-image: 
                radial-gradient(circle at 50% 50%, #0a1a0a 0%, #000 100%),
                linear-gradient(rgba(0, 255, 68, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 68, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 20px 20px, 20px 20px;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            touch-action: none;
        }

        /* HEADER */
        #header-panel {
            width: 100%;
            max-width: 420px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }

        .tab-container {
            display: flex;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 4px;
            border: 1px solid #333;
            flex: 1;
            margin-right: 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: #666;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--clr-main);
            color: #000;
            box-shadow: var(--shadow);
        }

        /* GAME AREA */
        #game-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        #stat-box {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            color: var(--clr-main);
            text-shadow: 0 0 8px rgba(0, 255, 68, 0.6);
        }

        #canvas-wrapper {
            position: relative;
            padding: 5px;
            background: linear-gradient(45deg, #111, #222);
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        canvas {
            display: block;
            border-radius: 14px;
            background: var(--clr-bg);
            border: 1px solid rgba(0, 255, 68, 0.2);
        }

        /* CONTROLS */
        #joypad {
            display: grid;
            grid-template-areas: ". up ." "left . right" ". down .";
            gap: 15px;
            margin-top: 25px;
        }

        .joy-btn {
            width: 75px;
            height: 75px;
            background: rgba(25, 25, 25, 0.9);
            border: 2px solid #333;
            color: #fff;
            font-size: 28px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #000;
            transition: 0.1s;
        }

        .joy-btn:active {
            background: var(--clr-main);
            color: #000;
            border-color: #fff;
            transform: translateY(3px);
            box-shadow: 0 1px 0 #000;
        }

        /* OVERLAYS */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(15px);
            transition: opacity 0.4s;
        }

        .neon-text {
            font-size: 64px;
            font-weight: 900;
            color: var(--clr-main);
            text-shadow: 0 0 30px var(--clr-main);
            margin-bottom: 40px;
            letter-spacing: 10px;
            font-style: italic;
        }

        .btn-action {
            padding: 22px 80px;
            background: var(--clr-main);
            color: #000;
            border: none;
            font-size: 24px;
            font-weight: 900;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(0, 255, 68, 0.4);
            transition: transform 0.2s;
        }

        .btn-action:active { transform: scale(0.95); }

        /* LEADERBOARD */
        #leaderboard-view {
            display: none;
            width: 100%;
            max-width: 380px;
            padding: 20px;
            height: 75vh;
            overflow-y: auto;
        }

        .rank-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 10px;
            border-radius: 15px;
            border-left: 5px solid var(--clr-main);
            backdrop-filter: blur(5px);
        }

        .rank-card.me {
            background: rgba(0, 255, 68, 0.1);
            border: 1px solid var(--clr-main);
        }

        .rank-name { font-weight: bold; font-size: 16px; }
        .rank-score { color: var(--clr-main); font-weight: 900; font-size: 18px; }

    </style>
</head>
<body>

<div id="header-panel">
    <div class="tab-container">
        <button id="nav-game" class="tab-btn active" onclick="switchTab('game')">Игра</button>
        <button id="nav-top" class="tab-btn" onclick="switchTab('top')">Топ Мира</button>
    </div>
    <div style="font-size: 24px; filter: drop-shadow(0 0 5px var(--clr-main))">🐲</div>
</div>

<div id="game-view">
    <div id="stat-box">
        <div>SCORE: <span id="val-score">0</span></div>
        <div>BEST: <span id="val-best">0</span></div>
    </div>
    <div id="canvas-wrapper">
        <canvas id="mainCanvas"></canvas>
    </div>
    <div id="joypad">
        <button class="joy-btn" style="grid-area:up" onpointerdown="sendKey(0,-1)">▲</button>
        <button class="joy-btn" style="grid-area:left" onpointerdown="sendKey(-1,0)">◀</button>
        <button class="joy-btn" style="grid-area:right" onpointerdown="sendKey(1,0)">▶</button>
        <button class="joy-btn" style="grid-area:down" onpointerdown="sendKey(0,1)">▼</button>
    </div>
</div>

<div id="leaderboard-view"></div>

<div id="menu-overlay" class="overlay">
    <h1 class="neon-text">SNAKE</h1>
    <div id="last-score-info" style="margin-bottom: 20px; font-size: 20px; color: #aaa;"></div>
    <button class="btn-action" onclick="beginSession()">START</button>
</div>

<script>
    /** --- TELEGRAM ENGINE --- **/
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    if(tg.disableVerticalSwipes) tg.disableVerticalSwipes();
    tg.enableClosingConfirmation();

    /** --- CONFIG & GLOBALS --- **/
    const API_ENDPOINT = "https://f141608d-1c6f-48a7-b475-76bfe617af45-00-bg39mkj1p2mv.sisko.replit.dev/api";
    const cvs = document.getElementById("mainCanvas");
    const ctx = cvs.getContext("2d");
    const GRID_SIZE = 20;

    let cellSize, isRunning = false, currentScore = 0;
    let record = localStorage.getItem('snake_pro_best') || 0;
    let snakeBody = [], ghostBody = [], fruit = {x: 5, y: 5}, fx = [];
    let movement = {x: 1, y: 0}, bufferedInput = {x: 1, y: 0};
    let lastStepTime = 0, stepInterval = 130;

    /** --- CORE LOGIC --- **/
    function adaptSize() {
        const minDim = Math.min(window.innerWidth - 50, window.innerHeight - 420, 420);
        cellSize = Math.floor(minDim / GRID_SIZE);
        cvs.width = cvs.height = cellSize * GRID_SIZE;
    }

    function spawnFruit() {
        fruit = { x: Math.floor(Math.random() * GRID_SIZE), y: Math.floor(Math.random() * GRID_SIZE) };
        if (snakeBody.some(s => s.x === fruit.x && s.y === fruit.y)) spawnFruit();
    }

    function sendKey(x, y) {
        if (x !== -movement.x || y !== -movement.y) bufferedInput = {x, y};
        if(tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
    }

    function beginSession() {
        document.getElementById('menu-overlay').style.opacity = '0';
        setTimeout(() => document.getElementById('menu-overlay').style.display = 'none', 400);
        
        currentScore = 0;
        isRunning = true;
        movement = {x: 1, y: 0};
        bufferedInput = {x: 1, y: 0};
        snakeBody = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
        ghostBody = JSON.parse(JSON.stringify(snakeBody));
        
        document.getElementById('val-score').textContent = "0";
        spawnFruit();
        lastStepTime = performance.now();
        requestAnimationFrame(engineLoop);
    }

    function engineLoop(ts) {
        if (!isRunning) return;
        requestAnimationFrame(engineLoop);

        const elapsed = ts - lastStepTime;
        let lerpFactor = Math.min(elapsed / stepInterval, 1);

        if (elapsed >= stepInterval) {
            ghostBody = JSON.parse(JSON.stringify(snakeBody));
            movement = bufferedInput;
            
            const newHead = { x: snakeBody[0].x + movement.x, y: snakeBody[0].y + movement.y };

            // Collision check
            if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE || 
                snakeBody.some(s => s.x === newHead.x && s.y === newHead.y)) {
                return finishSession();
            }

            snakeBody.unshift(newHead);

            if (newHead.x === fruit.x && newHead.y === fruit.y) {
                currentScore++;
                document.getElementById('val-score').textContent = currentScore;
                tg.HapticFeedback.impactOccurred('medium');
                // Particles
                for(let i=0; i<10; i++) fx.push({
                    x: fruit.x * cellSize + cellSize/2, 
                    y: fruit.y * cellSize + cellSize/2, 
                    vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, 
                    alpha: 1
                });
                spawnFruit();
            } else {
                snakeBody.pop();
            }
            lastStepTime = ts;
            lerpFactor = 0;
        }
        draw(lerpFactor);
    }

    function draw(interp) {
        ctx.clearRect(0, 0, cvs.width, cvs.height);

        // Grid (Cyberpunk style)
        ctx.strokeStyle = "rgba(0, 255, 68, 0.05)";
        ctx.lineWidth = 0.5;
        for(let i=0; i<=GRID_SIZE; i++) {
            ctx.beginPath(); ctx.moveTo(i*cellSize, 0); ctx.lineTo(i*cellSize, cvs.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i*cellSize); ctx.lineTo(cvs.width, i*cellSize); ctx.stroke();
        }

        // Fruit with Glow
        const fxPos = fruit.x * cellSize + cellSize/2;
        const fyPos = fruit.y * cellSize + cellSize/2;
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#ff3355";
        ctx.fillStyle = "#ff3355";
        ctx.beginPath();
        ctx.arc(fxPos, fyPos, cellSize/2.8 + Math.sin(Date.now()/120)*2, 0, Math.PI*2);
        ctx.fill();

        // FX Particles
        fx.forEach((p, i) => {
            ctx.shadowBlur = 0;
            ctx.fillStyle = `rgba(0, 255, 68, ${p.alpha})`;
            ctx.fillRect(p.x, p.y, 2, 2);
            p.x += p.vx; p.y += p.vy; p.alpha -= 0.03;
            if(p.alpha <= 0) fx.splice(i, 1);
        });

        // Snake with Interpolation (240Hz smoothness)
        ctx.shadowBlur = 12;
        ctx.shadowColor = "#00ff44";
        snakeBody.forEach((seg, i) => {
            const prev = ghostBody[i] || seg;
            const drawX = (prev.x + (seg.x - prev.x) * interp) * cellSize;
            const drawY = (prev.y + (seg.y - prev.y) * interp) * cellSize;
            
            const gradient = ctx.createLinearGradient(drawX, drawY, drawX + cellSize, drawY + cellSize);
            if (i === 0) {
                gradient.addColorStop(0, "#00ff44");
                gradient.addColorStop(1, "#00cc33");
            } else {
                gradient.addColorStop(0, "rgba(0, 255, 68, 0.8)");
                gradient.addColorStop(1, "rgba(0, 100, 30, 0.4)");
            }
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            // Rounded segments
            const r = cellSize * 0.3;
            ctx.roundRect(drawX + 1.5, drawY + 1.5, cellSize - 3, cellSize - 3, r);
            ctx.fill();
        });
        ctx.shadowBlur = 0;
    }

    function finishSession() {
        isRunning = false;
        if (currentScore > record) {
            record = currentScore;
            localStorage.setItem('snake_pro_best', record);
            document.getElementById('val-best').textContent = record;
        }
        
        tg.HapticFeedback.notificationOccurred('error');
        document.getElementById('last-score-info').textContent = `SCORE: ${currentScore}`;
        const menu = document.getElementById('menu-overlay');
        menu.style.display = 'flex';
        setTimeout(() => menu.style.opacity = '1', 10);

        if(tg.initData) {
            fetch(`${API_ENDPOINT}/score`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ init_data: tg.initData, score: currentScore })
            }).catch(() => {});
        }
    }

    /** --- UI NAVIGATION --- **/
    function switchTab(t) {
        document.getElementById('game-view').style.display = t === 'game' ? 'flex' : 'none';
        document.getElementById('leaderboard-view').style.display = t === 'top' ? 'block' : 'none';
        document.getElementById('nav-game').classList.toggle('active', t === 'game');
        document.getElementById('nav-top').classList.toggle('active', t === 'top');
        if(t === 'top') fetchLeaderboard();
    }

    async function fetchLeaderboard() {
        const box = document.getElementById('leaderboard-view');
        box.innerHTML = '<p style="text-align:center; margin-top:50px; opacity:0.5">Синхронизация с сервером...</p>';
        try {
            const res = await fetch(`${API_ENDPOINT}/leaderboard`);
            const data = await res.json();
            box.innerHTML = '<h2 style="text-align:center; margin-bottom:25px; color:var(--clr-main)">HALL OF FAME</h2>';
            data.forEach(item => {
                const isMe = tg.initDataUnsafe?.user?.id && String(item.user_id) === String(tg.initDataUnsafe.user.id);
                box.innerHTML += `
                    <div class="rank-card ${isMe ? 'me' : ''}">
                        <span class="rank-name">${item.rank}. ${item.name} ${isMe ? '(YOU)' : ''}</span>
                        <span class="rank-score">${item.score}</span>
                    </div>`;
            });
        } catch(e) { 
            box.innerHTML = '<p style="text-align:center; color:#ff3355">Ошибка сети. Рекорды временно недоступны.</p>'; 
        }
    }

    /** --- INPUT HANDLING --- **/
    let touchX, touchY;
    document.addEventListener('touchstart', e => {
        touchX = e.touches[0].clientX;
        touchY = e.touches[0].clientY;
    }, {passive: false});

    document.addEventListener('touchmove', e => {
        if (!touchX || !touchY) return;
        const dx = e.touches[0].clientX - touchX;
        const dy = e.touches[0].clientY - touchY;
        if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
            if (Math.abs(dx) > Math.abs(dy)) sendKey(dx > 0 ? 1 : -1, 0);
            else sendKey(0, dy > 0 ? 1 : -1);
            touchX = touchY = null;
        }
        e.preventDefault();
    }, {passive: false});

    adaptSize();
    document.getElementById('val-best').textContent = record;
    window.addEventListener('resize', adaptSize);
</script>

</body>
</html>
