<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Snake Master TWA</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { --clr: #00ff44; --bg: #050805; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      height: 100vh; height: 100dvh; overflow: hidden; touch-action: none;
    }

    /* Шапка */
    #header {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; max-width: 400px; padding: 15px; z-index: 10;
    }
    .tabs { display: flex; background: #1a1a1a; border-radius: 12px; padding: 3px; flex: 1; margin-right: 10px; }
    .tabs button {
      flex: 1; padding: 10px; background: transparent; border: none; color: #666;
      font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 9px;
    }
    .tabs button.active { background: var(--clr); color: #000; }
    
    .theme-toggle { display: flex; gap: 8px; }
    .t-dot { width: 24px; height: 24px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
    .t-dot.active { border-color: #fff; transform: scale(1.1); }

    /* Игра */
    #game-container { position: relative; display: flex; flex-direction: column; align-items: center; }
    #stats {
      display: flex; justify-content: space-between; width: 100%; padding: 10px 15px;
      font-family: monospace; font-size: 16px; color: var(--clr);
    }
    #stats b { color: #fff; }
    
    canvas {
      display: block; border: 3px solid var(--clr); border-radius: 12px;
      background: var(--bg); shadow: 0 0 20px rgba(0,255,68,0.2);
    }

    /* Кнопки */
    #controls {
      display: grid; grid-template-areas: ". up ." "left . right" ". down .";
      gap: 12px; margin-top: 20px;
    }
    .btn {
      width: 70px; height: 70px; background: #111; border: 2px solid #333;
      color: #fff; font-size: 28px; border-radius: 20px; display: flex;
      align-items: center; justify-content: center;
    }
    .btn:active { background: var(--clr); color: #000; border-color: #fff; }

    /* Меню (Оверлей) */
    #menu {
      position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; text-align: center;
    }
    .title { font-size: 50px; color: var(--clr); text-shadow: 0 0 20px var(--clr); margin-bottom: 20px; }
    .btn-main {
      padding: 18px 60px; background: var(--clr); color: #000; border: none;
      font-size: 22px; font-weight: bold; border-radius: 15px; cursor: pointer;
      box-shadow: 0 0 20px rgba(0,255,68,0.4);
    }
    .mode-box { display: flex; gap: 10px; margin-bottom: 30px; }
    .m-btn { padding: 8px 15px; background: #111; border: 1px solid #444; color: #888; border-radius: 8px; }
    .m-btn.active { border-color: var(--clr); color: var(--clr); }

    /* Таблица */
    #leaderboard {
      display: none; width: 100%; max-width: 360px; padding: 20px 10px;
      height: 70vh; overflow-y: auto;
    }
    .row {
      display: flex; justify-content: space-between; padding: 15px;
      background: #111; margin-bottom: 8px; border-radius: 12px; border-left: 4px solid var(--clr);
    }
    .row.me { border: 1px solid #ff0; background: #1a1a00; }
  </style>
</head>
<body>

<div id="header">
  <div class="tabs">
    <button id="b-game" class="active" onclick="showTab('game')">ИГРА</button>
    <button id="b-top" onclick="showTab('top')">ТОП 10</button>
  </div>
  <div class="theme-toggle">
    <div class="t-dot active" style="background:#0f4" onclick="setTheme('matrix')"></div>
    <div class="t-dot" style="background:#d0f" onclick="setTheme('neon')"></div>
  </div>
</div>

<div id="game-view">
  <div id="stats">
    <div>СЧЕТ: <b id="cur-score">0</b></div>
    <div>РЕКОРД: <b id="hi-score">0</b></div>
  </div>
  <div id="game-container">
    <canvas id="snakeCanvas"></canvas>
  </div>
  <div id="controls">
    <div class="btn" style="grid-area:up" onpointerdown="setDir(0,-1)">▲</div>
    <div class="btn" style="grid-area:left" onpointerdown="setDir(-1,0)">◀</div>
    <div class="btn" style="grid-area:right" onpointerdown="setDir(1,0)">▶</div>
    <div class="btn" style="grid-area:down" onpointerdown="setDir(0,1)">▼</div>
  </div>
</div>

<div id="leaderboard"></div>

<div id="menu">
  <h1 class="title">SNAKE</h1>
  <div class="mode-box">
    <button id="m-1" class="m-btn active" onclick="setMode('classic')">КЛАССИКА</button>
    <button id="m-2" class="m-btn" onclick="setMode('blitz')">БЛИЦ 60с</button>
  </div>
  <button class="btn-main" onclick="play()">ИГРАТЬ</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
if(tg.disableVerticalSwipes) tg.disableVerticalSwipes();

const API = "https://f141608d-1c6f-48a7-b475-76bfe617af45-00-bg39mkj1p2mv.sisko.replit.dev/api";
const canvas = document.getElementById("snakeCanvas");
const ctx = canvas.getContext("2d");

let score = 0, best = localStorage.getItem('s_best') || 0;
let alive = false, mode = 'classic', theme = 'matrix';
let snake = [], prevSnake = [], food = {x:5, y:5};
let curDir = {x:1, y:0}, nextDir = {x:1, y:0};
let lastTime = 0, tickRate = 140, CELL, COLS = 20;

function setMode(m) {
  mode = m;
  document.getElementById('m-1').className = m === 'classic' ? 'm-btn active' : 'm-btn';
  document.getElementById('m-2').className = m === 'blitz' ? 'm-btn active' : 'm-btn';
}

function setTheme(t) {
  theme = t;
  const c = t === 'matrix' ? '#0f4' : '#d0f';
  document.documentElement.style.setProperty('--clr', c);
  document.documentElement.style.setProperty('--bg', t === 'matrix' ? '#050805' : '#080010');
}

function resize() {
  const size = Math.min(window.innerWidth - 40, window.innerHeight - 380, 400);
  CELL = Math.floor(size / COLS);
  canvas.width = canvas.height = CELL * COLS;
}

function play() {
  document.getElementById('menu').style.display = 'none';
  score = 0; alive = true;
  curDir = {x:1, y:0}; nextDir = {x:1, y:0};
  snake = [{x:10, y:10}, {x:9, y:10}, {x:8, y:10}];
  prevSnake = JSON.parse(JSON.stringify(snake));
  document.getElementById('cur-score').textContent = "0";
  spawnFood();
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function spawnFood() {
  food = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*COLS) };
  if(snake.some(s => s.x === food.x && s.y === food.y)) spawnFood();
}

function setDir(x, y) {
  if (x !== -curDir.x || y !== -curDir.y) nextDir = {x, y};
  if(tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
}

function loop(t) {
  if (!alive) return;
  requestAnimationFrame(loop);
  const dt = t - lastTime;
  let p = dt / tickRate;

  if (dt >= tickRate) {
    prevSnake = JSON.parse(JSON.stringify(snake));
    curDir = nextDir;
    const head = { x: snake[0].x + curDir.x, y: snake[0].y + curDir.y };

    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= COLS || snake.some(s=>s.x===head.x && s.y===head.y)) {
      alive = false;
      return die();
    }

    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score++;
      document.getElementById('cur-score').textContent = score;
      tg.HapticFeedback.impactOccurred('light');
      spawnFood();
    } else { snake.pop(); }
    lastTime = t; p = 0;
  }
  draw(p);
}

function draw(p) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Сетка
  ctx.strokeStyle = "rgba(255,255,255,0.03)";
  for(let i=0; i<=COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(canvas.width,i*CELL); ctx.stroke();
  }

  // Еда
  ctx.fillStyle = theme === 'matrix' ? '#f35' : '#ff0';
  const pulse = Math.sin(Date.now()/150)*2;
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2.5 + pulse, 0, Math.PI*2);
  ctx.fill();

  // Змея
  const color = theme === 'matrix' ? '#0f4' : '#d0f';
  snake.forEach((s, i) => {
    const prev = prevSnake[i] || s;
    const x = (prev.x + (s.x - prev.x) * p) * CELL;
    const y = (prev.y + (s.y - prev.y) * p) * CELL;
    ctx.fillStyle = i === 0 ? color : color + "aa";
    ctx.fillRect(x+1, y+1, CELL-2, CELL-2);
  });
}

function die() {
  if (score > best) {
    best = score;
    localStorage.setItem('s_best', best);
    document.getElementById('hi-score').textContent = best;
  }
  tg.HapticFeedback.notificationOccurred('error');
  document.getElementById('menu').style.display = 'flex';
  
  fetch(`${API}/score`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ init_data: tg.initData, score: score })
  }).catch(e => {});
}

function showTab(t) {
  document.getElementById('game-view').style.display = t === 'game' ? 'flex' : 'none';
  document.getElementById('leaderboard').style.display = t === 'top' ? 'block' : 'none';
  document.getElementById('b-game').className = t === 'game' ? 'active' : '';
  document.getElementById('b-top').className = t === 'top' ? 'active' : '';
  if(t === 'top') loadTop();
}

async function loadTop() {
  const container = document.getElementById('leaderboard');
  container.innerHTML = '<p style="text-align:center">Загрузка...</p>';
  try {
    const res = await fetch(`${API}/leaderboard`);
    const data = await res.json();
    container.innerHTML = '<h2 style="text-align:center; margin-bottom:20px; color:var(--clr)">ТОП ИГРОКОВ</h2>';
    data.forEach(r => {
      const isMe = tg.initDataUnsafe?.user?.id && String(r.user_id) === String(tg.initDataUnsafe.user.id);
      container.innerHTML += `<div class="row ${isMe?'me':''}"><span>${r.rank}. ${r.name}</span><b>${r.score}</b></div>`;
    });
  } catch(e) { container.innerHTML = 'Ошибка'; }
}

// Управление
let sx, sy;
document.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, {passive:false});
document.addEventListener('touchmove', e => {
  if(!sx || !sy) return;
  const dx = e.touches[0].clientX - sx, dy = e.touches[0].clientY - sy;
  if(Math.abs(dx)>30 || Math.abs(dy)>30) {
    if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1, 0);
    else setDir(0, dy>0?1:-1);
    sx = sy = null;
  }
  e.preventDefault();
}, {passive:false});

resize();
document.getElementById('hi-score').textContent = best;
window.addEventListener('resize', resize);
</script>
</body>
</html>
