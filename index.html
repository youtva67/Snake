<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Snake Ultimate Neon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --clr-main: #00ff44;
            --clr-bg: #050805;
            --clr-accent: #ff3355;
            --shadow: 0 0 15px rgba(0, 255, 68, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #000;
            background-image: radial-gradient(circle at 50% 50%, #0a1a0a 0%, #000 100%);
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
            touch-action: none;
        }

        /* HEADER */
        #header-panel {
            width: 100%;
            max-width: 420px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }

        .tab-container {
            display: flex;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 4px;
            border: 1px solid #333;
            flex: 1;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: #666;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--clr-main);
            color: #000;
            box-shadow: var(--shadow);
        }

        /* GAME AREA */
        #game-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        #stat-box {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            padding: 10px 20px;
            font-family: monospace;
            font-size: 18px;
            color: var(--clr-main);
        }

        #timer { color: #ffeb3b; display: none; font-weight: bold; }

        canvas {
            display: block;
            border-radius: 14px;
            background: var(--clr-bg);
            border: 2px solid #1a1a1a;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* CONTROLS */
        #joypad {
            display: grid;
            grid-template-areas: ". up ." "left . right" ". down .";
            gap: 12px;
            margin-top: 20px;
        }

        .joy-btn {
            width: 70px;
            height: 70px;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            font-size: 26px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .joy-btn:active { background: var(--clr-main); color: #000; }

        /* OVERLAY / MENU */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .close-menu {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: #222;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #fff;
        }

        .mode-title { font-size: 14px; color: #888; margin-bottom: 10px; text-transform: uppercase; }

        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .mode-btn {
            padding: 12px 20px;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
        }

        .mode-btn.active {
            border-color: var(--clr-main);
            color: var(--clr-main);
            background: rgba(0, 255, 68, 0.1);
        }

        .btn-play {
            padding: 20px 80px;
            background: var(--clr-main);
            color: #000;
            border: none;
            font-size: 22px;
            font-weight: 900;
            border-radius: 18px;
            box-shadow: 0 0 30px rgba(0, 255, 68, 0.4);
        }

        /* LEADERBOARD */
        #leaderboard-view {
            display: none;
            width: 100%;
            max-width: 380px;
            padding: 20px;
            height: 70vh;
            overflow-y: auto;
        }

        .rank-card {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: #0f0f0f;
            margin-bottom: 8px;
            border-radius: 12px;
            border-left: 4px solid var(--clr-main);
        }

        .rank-card.me { border: 1px solid #ffeb3b; background: #1a1a00; }
    </style>
</head>
<body>

<div id="header-panel">
    <div class="tab-container">
        <button id="nav-game" class="tab-btn active" onclick="switchTab('game')">Игра</button>
        <button id="nav-top" class="tab-btn" onclick="switchTab('top')">Топ Мира</button>
    </div>
</div>

<div id="game-view">
    <div id="stat-box">
        <div>SCORE: <span id="v-score">0</span></div>
        <div id="timer">60s</div>
        <div>BEST: <span id="v-best">0</span></div>
    </div>
    <canvas id="mc"></canvas>
    <div id="joypad">
        <button class="joy-btn" style="grid-area:up" onpointerdown="key(0,-1)">▲</button>
        <button class="joy-btn" style="grid-area:left" onpointerdown="key(-1,0)">◀</button>
        <button class="joy-btn" style="grid-area:right" onpointerdown="key(1,0)">▶</button>
        <button class="joy-btn" style="grid-area:down" onpointerdown="key(0,1)">▼</button>
    </div>
</div>

<div id="leaderboard-view"></div>

<div id="menu-overlay" class="overlay">
    <div class="close-menu" onclick="closeMenu()">✕</div>
    <h1 style="font-size: 50px; color: var(--clr-main); margin-bottom: 40px; text-shadow: 0 0 20px var(--clr-main);">SNAKE</h1>
    
    <p class="mode-title">Выберите режим</p>
    <div class="mode-selector">
        <button id="btn-classic" class="mode-btn active" onclick="setMode('classic')">КЛАССИКА</button>
        <button id="btn-blitz" class="mode-btn" onclick="setMode('blitz')">БЛИЦ 60с</button>
    </div>

    <button class="btn-play" onclick="start()">ИГРАТЬ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    if(tg.disableVerticalSwipes) tg.disableVerticalSwipes();

    const API = "https://f141608d-1c6f-48a7-b475-76bfe617af45-00-bg39mkj1p2mv.sisko.replit.dev/api";
    const cvs = document.getElementById("mc");
    const ctx = cvs.getContext("2d");
    const GRID = 20;

    let sz, active = false, score = 0, best = localStorage.getItem('snk_hi') || 0;
    let snake = [], ghost = [], fruit = {x:5,y:5}, particles = [];
    let dir = {x:1,y:0}, next = {x:1,y:0}, mode = 'classic', timeLeft = 60;
    let lastT = 0, speed = 135;

    function setMode(m) {
        mode = m;
        document.getElementById('btn-classic').classList.toggle('active', m === 'classic');
        document.getElementById('btn-blitz').classList.toggle('active', m === 'blitz');
    }

    function closeMenu() { document.getElementById('menu-overlay').style.display = 'none'; }
    function openMenu() { document.getElementById('menu-overlay').style.display = 'flex'; }

    function adapt() {
        const d = Math.min(window.innerWidth - 40, window.innerHeight - 380, 400);
        sz = Math.floor(d / GRID);
        cvs.width = cvs.height = sz * GRID;
    }

    function key(x, y) {
        if (x !== -dir.x || y !== -dir.y) next = {x, y};
        tg.HapticFeedback.selectionChanged();
    }

    function start() {
        closeMenu();
        score = 0; active = true; timeLeft = 60;
        dir = {x:1,y:0}; next = {x:1,y:0};
        snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
        ghost = JSON.parse(JSON.stringify(snake));
        document.getElementById('v-score').textContent = "0";
        
        const tEl = document.getElementById('timer');
        if(mode === 'blitz') {
            tEl.style.display = 'block';
            tEl.textContent = '60s';
        } else { tEl.style.display = 'none'; }

        spawn();
        lastT = performance.now();
        requestAnimationFrame(loop);
    }

    function spawn() {
        fruit = { x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID) };
        if(snake.some(s=>s.x===fruit.x && s.y===fruit.y)) spawn();
    }

    function loop(ts) {
        if(!active) return;
        requestAnimationFrame(loop);
        const dt = ts - lastT;
        let p = Math.min(dt / speed, 1);

        if (dt >= speed) {
            ghost = JSON.parse(JSON.stringify(snake));
            dir = next;
            const h = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

            if(mode === 'blitz') {
                timeLeft -= (speed/1000);
                document.getElementById('timer').textContent = Math.ceil(timeLeft) + 's';
                if(timeLeft <= 0) return end();
            }

            if (h.x<0 || h.x>=GRID || h.y<0 || h.y>=GRID || snake.some(s=>s.x===h.x && s.y===h.y)) return end();

            snake.unshift(h);
            if (h.x === fruit.x && h.y === fruit.y) {
                score++; document.getElementById('v-score').textContent = score;
                tg.HapticFeedback.impactOccurred('medium');
                for(let i=0;i<8;i++) particles.push({x:fruit.x*sz+sz/2, y:fruit.y*sz+sz/2, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5, a:1});
                spawn();
            } else { snake.pop(); }
            lastT = ts; p = 0;
        }
        draw(p);
    }

    function draw(p) {
        ctx.fillStyle = "#050805";
        ctx.fillRect(0,0,cvs.width,cvs.height);

        // Grid
        ctx.strokeStyle = "rgba(0,255,68,0.03)";
        for(let i=0;i<=GRID;i++){
            ctx.beginPath(); ctx.moveTo(i*sz,0); ctx.lineTo(i*sz,cvs.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i*sz); ctx.lineTo(cvs.width,i*sz); ctx.stroke();
        }

        // Fruit
        ctx.shadowBlur = 10; ctx.shadowColor = "#f35"; ctx.fillStyle = "#f35";
        ctx.beginPath(); ctx.arc(fruit.x*sz+sz/2, fruit.y*sz+sz/2, sz/2.5, 0, Math.PI*2); ctx.fill();

        // Particles
        particles.forEach((pt, i) => {
            ctx.shadowBlur = 0; ctx.fillStyle = `rgba(0,255,68,${pt.a})`;
            ctx.fillRect(pt.x, pt.y, 2, 2);
            pt.x+=pt.vx; pt.y+=pt.vy; pt.a-=0.03;
            if(pt.a<=0) particles.splice(i,1);
        });

        // Snake
        ctx.shadowBlur = 10; ctx.shadowColor = "#0f4";
        snake.forEach((s, i) => {
            const pr = ghost[i] || s;
            const x = (pr.x + (s.x - pr.x)*p)*sz;
            const y = (pr.y + (s.y - pr.y)*p)*sz;
            ctx.fillStyle = i === 0 ? "#0f4" : "rgba(0,255,68,0.5)";
            ctx.beginPath(); ctx.roundRect(x+1.5, y+1.5, sz-3, sz-3, 5); ctx.fill();
        });
        ctx.shadowBlur = 0;
    }

    function end() {
        active = false;
        if(score > best) { best = score; localStorage.setItem('snk_hi', best); document.getElementById('v-best').textContent = best; }
        tg.HapticFeedback.notificationOccurred('error');
        openMenu();
        if(tg.initData) fetch(`${API}/score`, { method: "POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({init_data: tg.initData, score: score}) }).catch(()=>{});
    }

    function switchTab(t) {
        document.getElementById('game-view').style.display = t === 'game' ? 'flex' : 'none';
        document.getElementById('leaderboard-view').style.display = t === 'top' ? 'block' : 'none';
        document.getElementById('nav-game').classList.toggle('active', t === 'game');
        document.getElementById('nav-top').classList.toggle('active', t === 'top');
        if(t === 'top') { closeMenu(); fetchTop(); }
        else if(!active) { openMenu(); }
    }

    async function fetchTop() {
        const box = document.getElementById('leaderboard-view');
        box.innerHTML = '<p style="text-align:center; opacity:0.5; margin-top:50px;">Загрузка...</p>';
        try {
            const res = await fetch(`${API}/leaderboard`);
            const data = await res.json();
            box.innerHTML = '<h2 style="text-align:center; margin-bottom:20px; color:var(--clr-main)">Hall of Fame</h2>';
            data.forEach(r => {
                const isMe = tg.initDataUnsafe?.user?.id && String(r.user_id) === String(tg.initDataUnsafe.user.id);
                box.innerHTML += `<div class="rank-card ${isMe?'me':''}"><span>${r.rank}. ${r.name}</span><b>${r.score}</b></div>`;
            });
        } catch(e) { box.innerHTML = '<p style="text-align:center; color:#f35">Сервер спит...</p>'; }
    }

    // Input
    let tx, ty;
    document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:false});
    document.addEventListener('touchmove', e => {
        if(!tx || !ty) return;
        const dx = e.touches[0].clientX - tx, dy = e.touches[0].clientY - ty;
        if(Math.abs(dx)>30 || Math.abs(dy)>30) {
            if(Math.abs(dx)>Math.abs(dy)) key(dx>0?1:-1, 0);
            else key(0, dy>0?1:-1);
            tx = ty = null;
        }
        e.preventDefault();
    }, {passive:false});

    adapt();
    document.getElementById('v-best').textContent = best;
    window.addEventListener('resize', adapt);
</script>
</body>
</html>
