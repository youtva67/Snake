<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Snake Pro</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000; color: #0f0; font-family: sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; height: 100dvh; overflow: hidden; touch-action: none;
    }
    #top-bar { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 400px; padding: 10px; }
    #tabs { display: flex; flex: 1; background: #111; border-radius: 10px; padding: 3px; }
    #tabs button {
      flex: 1; padding: 8px; background: transparent; border: none; color: #555;
      font-size: 12px; font-weight: bold; border-radius: 8px;
    }
    #tabs button.active { background: #0f4; color: #000; }
    
    #scoreboard { display: flex; justify-content: space-between; width: 100%; max-width: 400px; margin-bottom: 10px; padding: 0 15px; }
    canvas { display: block; border: 2px solid #0f4; background: #050505; border-radius: 8px; }

    #dpad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 10px; margin-top: 20px; }
    #dpad button {
      width: 65px; height: 65px; background: #111; border: 1px solid #333; color: #fff;
      font-size: 24px; border-radius: 15px;
    }
    #dpad button:active { background: #0f4; color: #000; }

    #overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
    }
    .play-btn { padding: 15px 50px; background: #0f4; color: #000; border: none; font-size: 20px; font-weight: bold; border-radius: 12px; }
    
    #lb-panel { display: none; width: 100%; max-width: 350px; padding: 20px; overflow-y: auto; }
    .lb-row { display: flex; justify-content: space-between; padding: 10px; background: #111; margin-bottom: 5px; border-radius: 6px; }
  </style>
</head>
<body>

<div id="top-bar">
  <div id="tabs">
    <button id="tab-game" class="active" onclick="showTab('game')">ИГРА</button>
    <button id="tab-lb" onclick="showTab('lb')">ТОП</button>
  </div>
</div>

<div id="game-panel" style="display:flex; flex-direction:column; align-items:center;">
  <div id="scoreboard">
    <div>СЧЁТ: <span id="score">0</span></div>
    <div>РЕКОРД: <span id="best">0</span></div>
  </div>
  <canvas id="game"></canvas>
  <div id="dpad">
    <button style="grid-area:up" onpointerdown="handleInput(0,-1)">▲</button>
    <button style="grid-area:left" onpointerdown="handleInput(-1,0)">◀</button>
    <button style="grid-area:right" onpointerdown="handleInput(1,0)">▶</button>
    <button style="grid-area:down" onpointerdown="handleInput(0,1)">▼</button>
  </div>
</div>

<div id="lb-panel"></div>

<div id="overlay">
  <h1 style="margin-bottom:20px; font-size:40px;">SNAKE</h1>
  <button class="play-btn" onclick="startGame()">ИГРАТЬ</button>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
}

const API_URL = "https://f141608d-1c6f-48a7-b475-76bfe617af45-00-bg39mkj1p2mv.sisko.replit.dev/api";
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const COLS = 20;

let CELL, score = 0, alive = false;
let snake = [], prevSnake = [], food = {x:5, y:5};
let dir = {x:1, y:0}, nextDir = {x:1, y:0};
let lastTick = 0, tickMs = 150;
let best = localStorage.getItem('snake_best') || 0;

function resize() {
  const size = Math.min(window.innerWidth - 40, window.innerHeight - 350, 400);
  CELL = Math.floor(size / COLS);
  canvas.width = canvas.height = CELL * COLS;
}

function spawnFood() {
  food = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*COLS) };
  if(snake.some(s => s.x === food.x && s.y === food.y)) spawnFood();
}

function handleInput(x, y) {
  if (x !== -dir.x || y !== -dir.y) nextDir = {x, y};
  if (tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  alive = true;
  score = 0;
  dir = {x:1, y:0};
  nextDir = {x:1, y:0};
  snake = [{x:10, y:10}, {x:9, y:10}, {x:8, y:10}];
  prevSnake = JSON.parse(JSON.stringify(snake));
  spawnFood();
  document.getElementById('score').textContent = "0";
  lastTick = performance.now();
  requestAnimationFrame(gameLoop);
}

function gameLoop(t) {
  if (!alive) return;
  requestAnimationFrame(gameLoop);

  const delta = t - lastTick;
  let progress = delta / tickMs;

  if (delta >= tickMs) {
    prevSnake = JSON.parse(JSON.stringify(snake));
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= COLS || snake.some(s => s.x === head.x && s.y === head.y)) {
      alive = false;
      return endGame();
    }

    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score++;
      document.getElementById('score').textContent = score;
      if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
      spawnFood();
    } else {
      snake.pop();
    }
    lastTick = t;
    progress = 0;
  }
  render(progress);
}

function render(t) {
  ctx.fillStyle = "#050505";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Еда
  ctx.fillStyle = "#f35";
  ctx.fillRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4);

  // Змейка с интерполяцией
  snake.forEach((p, i) => {
    const prev = prevSnake[i] || p;
    const drawX = (prev.x + (p.x - prev.x) * t) * CELL;
    const drawY = (prev.y + (p.y - prev.y) * t) * CELL;

    ctx.fillStyle = i === 0 ? "#0f4" : "#0a4";
    ctx.fillRect(drawX + 1, drawY + 1, CELL - 2, CELL - 2);
  });
}

function endGame() {
  if (score > best) {
    best = score;
    localStorage.setItem('snake_best', best);
    document.getElementById('best').textContent = best;
  }
  document.getElementById('overlay').style.display = 'flex';
  if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
  
  fetch(`${API_URL}/score`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ init_data: tg?.initData, score: score })
  }).catch(() => {});
}

// Управление свайпами
let ts = null;
document.addEventListener('touchstart', e => { ts = {x:e.touches[0].clientX, y:e.touches[0].clientY}; }, {passive: false});
document.addEventListener('touchmove', e => {
  if (!ts) return;
  const dx = e.touches[0].clientX - ts.x, dy = e.touches[0].clientY - ts.y;
  if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
    if (Math.abs(dx) > Math.abs(dy)) handleInput(dx > 0 ? 1 : -1, 0);
    else handleInput(0, dy > 0 ? 1 : -1);
    ts = null;
  }
  e.preventDefault();
}, {passive: false});

function showTab(tab) {
  document.getElementById('game-panel').style.display = tab === 'game' ? 'flex' : 'none';
  document.getElementById('lb-panel').style.display = tab === 'lb' ? 'flex' : 'none';
  document.getElementById('tab-game').className = tab === 'game' ? 'active' : '';
  document.getElementById('tab-lb').className = tab === 'lb' ? 'active' : '';
  if (tab === 'lb') loadLeaderboard();
}

async function loadLeaderboard() {
  const lb = document.getElementById('lb-panel');
  lb.innerHTML = '<p>Загрузка...</p>';
  try {
    const res = await fetch(`${API_URL}/leaderboard`);
    const data = await res.json();
    lb.innerHTML = '<h2 style="margin-bottom:10px">ТОП</h2>';
    data.forEach(r => {
      lb.innerHTML += `<div class="lb-row"><span>${r.rank}. ${r.name}</span><b>${r.score}</b></div>`;
    });
  } catch(e) { lb.innerHTML = 'Ошибка'; }
}

resize();
document.getElementById('best').textContent = best;
window.addEventListener('resize', resize);
</script>
</body>
</html>
