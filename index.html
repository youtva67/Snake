<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Snake TWA</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* Базовые стили и обнуление */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      font-family: 'Courier New', monospace;
      color: #0f0;
      overflow: hidden;
      user-select: none;
      touch-action: none; /* Отключает системные свайпы и зум */
    }

    /* Верхняя панель: табы и темы */
    #top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 380px;
      padding: 10px;
      gap: 10px;
    }
    #tabs { display: flex; flex: 1; background: #111; border-radius: 8px; padding: 2px; }
    #tabs button {
      flex: 1; padding: 8px;
      background: transparent; border: none; color: #555;
      font-family: inherit; font-size: 12px; cursor: pointer; border-radius: 6px;
      transition: all 0.2s;
    }
    #tabs button.active { background: var(--clr, #0f0); color: #000; font-weight: bold; }
    
    #theme-picker { display: flex; gap: 8px; }
    .theme-dot {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
    }
    .theme-dot.active { border-color: #fff; transform: scale(1.1); }
    .theme-dot[data-theme="matrix"] { background: #00cc44; }
    .theme-dot[data-theme="neon"]   { background: #cc00ff; }
    .theme-dot[data-theme="arctic"] { background: #44aaff; }

    /* Табло счета */
    #scoreboard {
      display: flex; justify-content: space-between; width: 100%; max-width: 380px;
      margin-bottom: 8px; font-size: 14px; letter-spacing: 1px; padding: 0 10px;
    }
    #scoreboard span { color: #fff; font-weight: bold; }
    #timer-display { color: #ff0; }

    /* Игровое поле */
    canvas { 
      display: block; 
      border: 2px solid var(--clr, #0f0); 
      background: #050505;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    /* Кнопки управления */
    #dpad {
      display: grid;
      grid-template-areas: ". up ." "left . right" ". down .";
      gap: 10px; margin-top: 15px;
    }
    #dpad button {
      width: 65px; height: 65px;
      background: #0d1f0d; border: 2px solid var(--clr, #00cc44); color: var(--clr, #00ff66);
      font-size: 24px; cursor: pointer; border-radius: 14px;
      transition: background 0.1s;
    }
    #dpad button:active { background: var(--clr, #00cc44); color: #000; }
    #dpad button[data-d="up"]    { grid-area: up; }
    #dpad button[data-d="left"]  { grid-area: left; }
    #dpad button[data-d="right"] { grid-area: right; }
    #dpad button[data-d="down"]  { grid-area: down; }

    /* Оверлей меню и конца игры */
    #overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 100;
      padding: 20px;
    }
    #overlay h1 { font-size: 36px; color: var(--clr,#0f0); letter-spacing: 4px; margin-bottom: 15px; }
    .mode-btn {
      padding: 10px 20px; background: #111; border: 2px solid #333;
      color: #aaa; font-family: inherit; font-size: 13px;
      cursor: pointer; border-radius: 8px; margin: 5px;
    }
    .mode-btn.active { border-color: var(--clr,#0f0); color: var(--clr,#0f0); background: #0a1a0a; }
    .play-btn {
      margin-top: 20px; padding: 15px 50px;
      background: var(--clr,#0f0); color: #000; border: none;
      font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer;
    }

    /* Таблица лидеров */
    #lb-panel { display: none; flex-direction: column; width: 100%; max-width: 340px; }
    .lb-row {
      display: flex; justify-content: space-between; padding: 10px;
      background: #111; margin-bottom: 5px; border-radius: 6px; border: 1px solid var(--clr);
    }
    .lb-me { border-color: #ff0; background: #1a1a00; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="top-bar">
  <div id="tabs">
    <button id="tab-game" class="active" onclick="showTab('game')">🎮 ИГРА</button>
    <button id="tab-lb" onclick="showTab('lb')">🏅 ТОП</button>
  </div>
  <div id="theme-picker">
    <div class="theme-dot active" data-theme="matrix" onclick="setTheme('matrix')"></div>
    <div class="theme-dot" data-theme="neon" onclick="setTheme('neon')"></div>
    <div class="theme-dot" data-theme="arctic" onclick="setTheme('arctic')"></div>
  </div>
</div>

<div id="game-panel" style="display:flex; flex-direction:column; align-items:center;">
  <div id="scoreboard">
    <div>СЧЁТ: <span id="score">0</span></div>
    <div id="timer-display" class="hidden">⏱ 60s</div>
    <div>РЕКОРД: <span id="best">0</span></div>
  </div>
  <canvas id="game"></canvas>
  <div id="dpad">
    <button data-d="up">▲</button>
    <button data-d="left">◀</button>
    <button data-d="right">▶</button>
    <button data-d="down">▼</button>
  </div>
</div>

<div id="lb-panel">
  <h2 style="text-align:center; margin-bottom:15px; color:var(--clr)">🏅 ТАБЛИЦА ЛИДЕРОВ</h2>
  <div id="lb-content">Загрузка...</div>
</div>

<div id="overlay">
  <h1 id="over-title">SNAKE</h1>
  <div id="over-stats" style="color:#fff; margin-bottom:15px;" class="hidden"></div>
  
  <p style="font-size: 11px; color: #555; margin-bottom: 8px; letter-spacing: 2px;">ВЫБЕРИТЕ РЕЖИМ</p>
  <div style="display: flex; gap: 5px; justify-content: center; margin-bottom: 15px;">
    <button id="mode-classic" class="mode-btn active" onclick="setChallenge('classic')">КЛАССИКА</button>
    <button id="mode-blitz" class="mode-btn" onclick="setChallenge('blitz')">БЛИЦ (60с)</button>
  </div>

  <button class="play-btn" onclick="startGame()">ИГРАТЬ</button>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// Ссылка на ваш API на Replit
const API_URL = "https://f141608d-1c6f-48a7-b475-76bfe617af45-00-bg39mkj1p2mv.sisko.replit.dev/api";

const THEMES = {
  matrix: { bg:'#0a0f0a', grid:'rgba(0,255,0,0.05)', clr:'#00ff44', food:'#ff3355' },
  neon:   { bg:'#08000f', grid:'rgba(200,0,255,0.05)', clr:'#dd00ff', food:'#ff6600' },
  arctic: { bg:'#020810', grid:'rgba(80,160,255,0.05)', clr:'#44bbff', food:'#00ffff' }
};

let curTheme = localStorage.getItem('snake_theme') || 'matrix';
let curChallenge = 'classic';
let score = 0, best = localStorage.getItem('snake_best') || 0;
let alive = false;
let gameLoopId, timerInterval;

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const COLS = 20, ROWS = 20;
let CELL;

// Змейка и управление
let snake = [], food = {}, dir = {x:1, y:0}, inputQueue = [];
let lastTick = 0, tickMs = 150, timeLeft = 60;

function setTheme(name) {
  curTheme = name;
  localStorage.setItem('snake_theme', name);
  document.documentElement.style.setProperty('--clr', THEMES[name].clr);
  document.querySelectorAll('.theme-dot').forEach(d => d.classList.toggle('active', d.dataset.theme === name));
  render();
}

function setChallenge(mode) {
  curChallenge = mode;
  document.getElementById('mode-classic').classList.toggle('active', mode === 'classic');
  document.getElementById('mode-blitz').classList.toggle('active', mode === 'blitz');
  tg?.HapticFeedback?.selectionChanged();
}

function showTab(tab) {
  document.getElementById('game-panel').style.display = tab === 'game' ? 'flex' : 'none';
  document.getElementById('lb-panel').style.display = tab === 'lb' ? 'flex' : 'none';
  document.getElementById('tab-game').classList.toggle('active', tab === 'game');
  document.getElementById('tab-lb').classList.toggle('active', tab === 'lb');
  if (tab === 'lb') loadLeaderboard();
}

function resize() {
  const size = Math.min(window.innerWidth - 30, window.innerHeight - 350, 380);
  CELL = Math.floor(size / COLS);
  canvas.width = CELL * COLS;
  canvas.height = CELL * ROWS;
  render();
}

function spawnFood() {
  food = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
  if (snake.some(s => s.x === food.x && s.y === food.y)) spawnFood();
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  alive = true;
  score = 0;
  dir = {x: 1, y: 0};
  inputQueue = [];
  snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
  spawnFood();
  
  tickMs = curChallenge === 'blitz' ? 130 : 160;
  
  document.getElementById('score').textContent = "0";
  const timerEl = document.getElementById('timer-display');
  
  clearInterval(timerInterval);
  if(curChallenge === 'blitz') {
    timeLeft = 60;
    timerEl.classList.remove('hidden');
    timerEl.textContent = `⏱ 60s`;
    timerInterval = setInterval(() => {
      timeLeft--;
      timerEl.textContent = `⏱ ${timeLeft}s`;
      if(timeLeft <= 0) endGame();
    }, 1000);
  } else {
    timerEl.classList.add('hidden');
  }

  lastTick = performance.now();
  requestAnimationFrame(loop);
}

function loop(t) {
  if (!alive) return;
  gameLoopId = requestAnimationFrame(loop);
  
  if (t - lastTick >= tickMs) {
    update();
    lastTick = t;
  }
  render();
}

function update() {
  if (inputQueue.length > 0) {
    const next = inputQueue.shift();
    if (next.x !== -dir.x || next.y !== -dir.y) dir = next;
  }

  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Столкновения со стенами или собой
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || 
      snake.some(s => s.x === head.x && s.y === head.y)) {
    return endGame();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 1;
    document.getElementById('score').textContent = score;
    tg?.HapticFeedback?.impactOccurred('light');
    spawnFood();
  } else {
    snake.pop();
  }
}

function render() {
  const theme = THEMES[curTheme];
  ctx.fillStyle = theme.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Сетка (тонкая)
  ctx.strokeStyle = theme.grid;
  ctx.lineWidth = 1;
  for(let i=0; i<=COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i*CELL); ctx.lineTo(canvas.width, i*CELL); ctx.stroke();
  }

  // Еда (с эффектом пульсации)
  const pulse = Math.sin(Date.now() / 150) * 1.5;
  ctx.fillStyle = theme.food;
  ctx.beginPath();
  ctx.arc(food.x*CELL + CELL/2, food.y*CELL + CELL/2, (CELL/2 - 3) + pulse, 0, Math.PI*2);
  ctx.fill();

  // Змейка
  snake.forEach((p, i) => {
    ctx.fillStyle = i === 0 ? theme.clr : theme.clr + "AA"; // Тело чуть прозрачнее
    const r = i === 0 ? CELL*0.3 : CELL*0.2; // Скругление
    ctx.beginPath();
    ctx.roundRect(p.x*CELL + 1, p.y*CELL + 1, CELL - 2, CELL - 2, r);
    ctx.fill();
  });
}

function endGame() {
  alive = false;
  clearInterval(timerInterval);
  cancelAnimationFrame(gameLoopId);
  tg?.HapticFeedback?.notificationOccurred('error');

  if (score > best) {
    best = score;
    localStorage.setItem('snake_best', best);
    document.getElementById('best').textContent = best;
  }

  submitScore(score); // Отправка на бэкенд

  document.getElementById('over-title').textContent = "💀 КОНЕЦ";
  document.getElementById('over-stats').textContent = `СЧЁТ: ${score}`;
  document.getElementById('over-stats').classList.remove('hidden');
  document.getElementById('overlay').style.display = 'flex';
}

// Управление и обработка ввода
function handleInput(nx, ny) {
  if (!alive) return;
  const lastInQueue = inputQueue.length > 0 ? inputQueue[inputQueue.length-1] : dir;
  if (nx !== -lastInQueue.x || ny !== -lastInQueue.y) {
    inputQueue.push({x: nx, y: ny});
  }
}

document.querySelectorAll('#dpad button').forEach(btn => {
  btn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    const d = btn.dataset.d;
    if(d === 'up') handleInput(0, -1);
    if(d === 'down') handleInput(0, 1);
    if(d === 'left') handleInput(-1, 0);
    if(d === 'right') handleInput(1, 0);
  });
});

window.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowUp' || e.key === 'w') handleInput(0, -1);
  if(e.key === 'ArrowDown' || e.key === 's') handleInput(0, 1);
  if(e.key === 'ArrowLeft' || e.key === 'a') handleInput(-1, 0);
  if(e.key === 'ArrowRight' || e.key === 'd') handleInput(1, 0);
});

// Работа с API
async function submitScore(s) {
  const initData = tg?.initData;
  if (!initData) return;
  try {
    await fetch(`${API_URL}/score`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ init_data: initData, score: s }),
    });
  } catch (e) { console.error("Score submit error", e); }
}

async function loadLeaderboard() {
  const cont = document.getElementById('lb-content');
  cont.innerHTML = "Загрузка...";
  try {
    const res = await fetch(`${API_URL}/leaderboard`);
    const rows = await res.json();
    const myId = tg?.initDataUnsafe?.user?.id;
    
    cont.innerHTML = "";
    if (!rows.length) { cont.innerHTML = "Пока никто не играл!"; return; }

    rows.forEach(r => {
      const isMe = myId && String(r.user_id) === String(myId);
      const div = document.createElement("div");
      div.className = "lb-row" + (isMe ? " lb-me" : "");
      div.innerHTML = `
        <span>${r.rank}. ${r.name}${isMe ? " (Вы)" : ""}</span>
        <b>${r.score}</b>
      `;
      cont.appendChild(div);
    });
  } catch (e) {
    cont.innerHTML = "Ошибка загрузки данных";
  }
}

// Запуск
setTheme(curTheme);
resize();
window.addEventListener('resize', resize);
document.getElementById('best').textContent = best;
</script>

</body>
</html>
