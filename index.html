<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Snake Ultimate Skins</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --clr: #0f4;
            --bg: #050805;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body {
            background: #000; color: #fff; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100dvh; overflow: hidden; touch-action: none;
        }

        /* HEADER */
        #header {
            width: 100%; max-width: 420px; padding: 15px;
            display: flex; justify-content: space-between; align-items: center; z-index: 50;
        }
        .tabs { display: flex; background: #111; border-radius: 12px; padding: 3px; border: 1px solid #333; flex: 1; }
        .tab { flex: 1; padding: 8px; border: none; background: transparent; color: #555; font-size: 12px; font-weight: bold; border-radius: 10px; }
        .tab.active { background: var(--clr); color: #000; }

        /* HUD */
        #hud {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: 400px; padding: 5px 15px;
            font-family: monospace; color: var(--clr); font-size: 18px;
        }
        .pause-btn {
            background: #222; border: 1px solid #444; color: #fff;
            width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
        }

        canvas {
            display: block; border-radius: 12px; background: var(--bg);
            border: 2px solid #1a1a1a; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* CONTROLS */
        #joy { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 10px; margin-top: 15px; }
        .btn { width: 68px; height: 68px; background: #111; border: 1px solid #333; color: #fff; font-size: 24px; border-radius: 18px; display: flex; align-items: center; justify-content: center; }
        .btn:active { background: var(--clr); color: #000; }

        /* MENU / OVERLAY */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(8px); text-align: center;
        }
        .title { font-size: 42px; color: var(--clr); text-shadow: 0 0 20px var(--clr); margin-bottom: 20px; }
        
        /* SKIN SELECTOR */
        .skin-box { display: flex; gap: 10px; margin: 15px 0; }
        .skin { width: 45px; height: 45px; border-radius: 10px; border: 2px solid #333; cursor: pointer; }
        .skin.active { border-color: #fff; transform: scale(1.1); box-shadow: 0 0 10px #fff; }

        .mode-sel { display: flex; gap: 8px; margin-bottom: 25px; }
        .m-btn { padding: 10px 15px; background: #111; border: 1px solid #444; color: #888; border-radius: 8px; font-size: 12px; }
        .m-btn.active { border-color: var(--clr); color: var(--clr); }

        .play-btn { padding: 18px 70px; background: var(--clr); color: #000; border: none; font-size: 22px; font-weight: bold; border-radius: 15px; }

        /* LEADERBOARD */
        #top-view { display: none; width: 100%; max-width: 380px; padding: 20px; height: 75vh; overflow-y: auto; }
        .row { display: flex; justify-content: space-between; padding: 14px; background: #0f0f0f; margin-bottom: 8px; border-radius: 12px; border-left: 4px solid var(--clr); }
        .row.me { border: 1px solid #fff; background: #222; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="header">
    <div class="tabs">
        <button id="t-game" class="tab active" onclick="nav('game')">ИГРА</button>
        <button id="t-top" class="tab" onclick="nav('top')">ТОП</button>
    </div>
</div>

<div id="game-ui">
    <div id="hud">
        <div id="pause-trigger" class="pause-btn" onclick="pauseGame()">⏸</div>
        <div id="v-score">0</div>
        <div id="v-timer" style="display:none; color:#ff0">60s</div>
        <div style="font-size:12px; opacity:0.5">BEST: <span id="v-best">0</span></div>
    </div>
    <canvas id="c"></canvas>
    <div id="joy">
        <div class="btn" style="grid-area:up" onpointerdown="ctrl(0,-1)">▲</div>
        <div class="btn" style="grid-area:left" onpointerdown="ctrl(-1,0)">◀</div>
        <div class="btn" style="grid-area:right" onpointerdown="ctrl(1,0)">▶</div>
        <div class="btn" style="grid-area:down" onpointerdown="ctrl(0,1)">▼</div>
    </div>
</div>

<div id="top-view"></div>

<div id="menu" class="overlay">
    <h1 class="title" id="menu-title">SNAKE</h1>
    
    <p style="font-size:12px; color:#666; margin-bottom:5px;">ВЫБЕРИ СКИН</p>
    <div class="skin-box">
        <div class="skin active" style="background:#0f4" data-skin="neon" onclick="setSkin('neon')"></div>
        <div class="skin" style="background:#0cf" data-skin="cyber" onclick="setSkin('cyber')"></div>
        <div class="skin" style="background:#ff0" data-skin="gold" onclick="setSkin('gold')"></div>
        <div class="skin" style="background:linear-gradient(45deg, #f0f, #00f)" data-skin="rgb" onclick="setSkin('rgb')"></div>
    </div>

    <div class="mode-sel">
        <button id="m-classic" class="m-btn active" onclick="setMode('classic')">КЛАССИКА</button>
        <button id="m-blitz" class="m-btn" onclick="setMode('blitz')">БЛИЦ 60с</button>
    </div>

    <button class="play-btn" onclick="play()">ИГРАТЬ</button>
    <p id="resume-hint" style="margin-top:15px; color:#555; font-size:12px; display:none;">Игра на паузе</p>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand(); if(tg.disableVerticalSwipes) tg.disableVerticalSwipes();

const API = "https://f141608d-1c6f-48a7-b475-76bfe617af45-00-bg39mkj1p2mv.sisko.replit.dev/api";
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const G = 20;

let cellSize, alive = false, paused = false, score = 0, best = localStorage.getItem('s_hi') || 0;
let snake = [], ghost = [], food = {x:5,y:5}, parts = [];
let dir = {x:1,y:0}, next = {x:1,y:0}, mode = 'classic', timeLeft = 60;
let lastT = 0, speed = 135, skin = 'neon';

const skins = {
    neon: { head: '#0f4', body: 'rgba(0,255,68,0.5)', glow: '#0f4' },
    cyber: { head: '#0cf', body: 'rgba(0,204,255,0.5)', glow: '#0cf' },
    gold: { head: '#ff0', body: 'rgba(255,235,59,0.5)', glow: '#ff0' },
    rgb: { head: '#f0f', body: 'rgba(255,0,255,0.5)', glow: '#f0f' }
};

function setSkin(s) {
    skin = s;
    document.querySelectorAll('.skin').forEach(el => el.classList.toggle('active', el.dataset.skin === s));
    document.documentElement.style.setProperty('--clr', skins[s].head);
}

function setMode(m) {
    mode = m;
    document.getElementById('m-classic').classList.toggle('active', m === 'classic');
    document.getElementById('m-blitz').classList.toggle('active', m === 'blitz');
}

function nav(t) {
    if(t === 'top') {
        if(alive) paused = true;
        document.getElementById('game-ui').classList.add('hidden');
        document.getElementById('top-view').classList.remove('hidden');
        document.getElementById('t-game').classList.remove('active');
        document.getElementById('t-top').classList.add('active');
        loadTop();
    } else {
        document.getElementById('game-ui').classList.remove('hidden');
        document.getElementById('top-view').classList.add('hidden');
        document.getElementById('t-game').classList.add('active');
        document.getElementById('t-top').classList.remove('active');
        if(!alive) openMenu();
    }
}

function openMenu() {
    paused = true;
    document.getElementById('menu').classList.remove('hidden');
    document.getElementById('menu-title').textContent = alive ? "ПАУЗА" : "SNAKE";
    document.getElementById('resume-hint').style.display = alive ? "block" : "none";
}

function pauseGame() { if(alive) openMenu(); }

function play() {
    document.getElementById('menu').classList.add('hidden');
    if(alive && paused) { paused = false; lastT = performance.now(); requestAnimationFrame(loop); return; }
    
    score = 0; alive = true; paused = false; timeLeft = 60;
    dir = {x:1,y:0}; next = {x:1,y:0};
    snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    ghost = JSON.parse(JSON.stringify(snake));
    document.getElementById('v-score').textContent = "0";
    document.getElementById('v-timer').style.display = mode === 'blitz' ? 'block' : 'none';
    
    spawn();
    lastT = performance.now();
    requestAnimationFrame(loop);
}

function spawn() {
    food = { x: Math.floor(Math.random()*G), y: Math.floor(Math.random()*G) };
    if(snake.some(s=>s.x===food.x && s.y===food.y)) spawn();
}

function ctrl(x, y) {
    if (x !== -dir.x || y !== -dir.y) next = {x, y};
    tg.HapticFeedback.selectionChanged();
}

function loop(ts) {
    if(!alive || paused) return;
    requestAnimationFrame(loop);
    const dt = ts - lastT;
    let p = Math.min(dt / speed, 1);

    if (dt >= speed) {
        ghost = JSON.parse(JSON.stringify(snake));
        dir = next;
        const h = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        if(mode === 'blitz') {
            timeLeft -= (speed/1000);
            document.getElementById('v-timer').textContent = Math.ceil(timeLeft) + 's';
            if(timeLeft <= 0) return end();
        }

        if (h.x<0 || h.x>=G || h.y<0 || h.y>=G || snake.some(s=>s.x===h.x && s.y===h.y)) return end();

        snake.unshift(h);
        if (h.x === food.x && h.y === food.y) {
            score++; document.getElementById('v-score').textContent = score;
            tg.HapticFeedback.impactOccurred('medium');
            for(let i=0;i<6;i++) parts.push({x:food.x*cellSize+cellSize/2, y:food.y*cellSize+cellSize/2, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5, a:1});
            spawn();
        } else { snake.pop(); }
        lastT = ts; p = 0;
    }
    render(p);
}

function render(p) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const s = skins[skin];

    // Еда
    ctx.shadowBlur = 15; ctx.shadowColor = '#f35'; ctx.fillStyle = '#f35';
    ctx.beginPath(); ctx.arc(food.x*cellSize+cellSize/2, food.y*cellSize+cellSize/2, cellSize/2.5, 0, Math.PI*2); ctx.fill();

    // Эффекты
    parts.forEach((pt, i) => {
        ctx.shadowBlur = 0; ctx.fillStyle = `rgba(0,255,68,${pt.a})`;
        ctx.fillRect(pt.x, pt.y, 2, 2);
        pt.x+=pt.vx; pt.y+=pt.vy; pt.a-=0.04;
        if(pt.a<=0) parts.splice(i,1);
    });

    // Змея
    ctx.shadowBlur = 10; ctx.shadowColor = s.glow;
    snake.forEach((seg, i) => {
        const pr = ghost[i] || seg;
        const x = (pr.x + (seg.x - pr.x)*p)*cellSize;
        const y = (pr.y + (seg.y - pr.y)*p)*cellSize;
        
        if(skin === 'rgb') {
            ctx.fillStyle = `hsl(${(Date.now()/10 + i*15)%360}, 100%, 50%)`;
        } else {
            ctx.fillStyle = i === 0 ? s.head : s.body;
        }
        
        ctx.beginPath(); ctx.roundRect(x+1, y+1, cellSize-2, cellSize-2, 6); ctx.fill();
    });
    ctx.shadowBlur = 0;
}

function end() {
    alive = false;
    if(score > best) { best = score; localStorage.setItem('s_hi', best); document.getElementById('v-best').textContent = best; }
    tg.HapticFeedback.notificationOccurred('error');
    openMenu();
    if(tg.initData) fetch(`${API}/score`, { method: "POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({init_data: tg.initData, score: score}) }).catch(()=>{});
}

async function loadTop() {
    const v = document.getElementById('top-view');
    v.innerHTML = '<p style="text-align:center; opacity:0.5; margin-top:50px;">Загрузка...</p>';
    try {
        const res = await fetch(`${API}/leaderboard`);
        const data = await res.json();
        v.innerHTML = '<h2 style="text-align:center; margin-bottom:20px; color:var(--clr)">ТОП ИГРОКОВ</h2>';
        data.forEach(r => {
            const isMe = tg.initDataUnsafe?.user?.id && String(r.user_id) === String(tg.initDataUnsafe.user.id);
            v.innerHTML += `<div class="row ${isMe?'me':''}"><span>${r.rank}. ${r.name}</span><b>${r.score}</b></div>`;
        });
    } catch(e) { v.innerHTML = '<p style="text-align:center">Сервер не отвечает</p>'; }
}

function resize() {
    const d = Math.min(window.innerWidth - 40, window.innerHeight - 380, 400);
    cellSize = Math.floor(d / G);
    canvas.width = canvas.height = cellSize * G;
}

// Input
let tx, ty;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:false});
document.addEventListener('touchmove', e => {
    if(!tx || !ty) return;
    const dx = e.touches[0].clientX - tx, dy = e.touches[0].clientY - ty;
    if(Math.abs(dx)>30 || Math.abs(dy)>30) {
        if(Math.abs(dx)>Math.abs(dy)) ctrl(dx>0?1:-1, 0);
        else ctrl(0, dy>0?1:-1);
        tx = ty = null;
    }
    e.preventDefault();
}, {passive:false});

resize();
document.getElementById('v-best').textContent = best;
window.addEventListener('resize', resize);
</script>
</body>
</html>
