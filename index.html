<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Snake Neon Ultra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --clr: #00ff44; --bg: #050805; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: #000; color: #fff; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100dvh; overflow: hidden; touch-action: none;
        }

        /* Шапка интерфейса */
        #ui-header { width: 100%; max-width: 400px; padding: 10px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .tabs { display: flex; background: #111; border-radius: 10px; padding: 2px; border: 1px solid #222; }
        .tabs button { padding: 8px 15px; background: transparent; border: none; color: #555; font-size: 12px; font-weight: bold; border-radius: 8px; }
        .tabs button.active { background: var(--clr); color: #000; box-shadow: 0 0 10px var(--clr); }

        /* Игровое поле */
        #game-view { display: flex; flex-direction: column; align-items: center; }
        #stats { display: flex; justify-content: space-between; width: 100%; padding: 5px 10px; font-family: monospace; color: var(--clr); font-size: 16px; }
        canvas { display: block; border: 2px solid #1a1a1a; border-radius: 12px; background: rgba(0, 20, 0, 0.2); box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        /* Кнопки управления */
        #controls { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 15px; margin-top: 15px; }
        .btn-dir { width: 65px; height: 65px; background: #111; border: 1px solid #333; color: #fff; font-size: 24px; border-radius: 18px; display: flex; align-items: center; justify-content: center; }
        .btn-dir:active { background: var(--clr); color: #000; transform: scale(0.9); }

        /* Оверлей меню */
        #menu { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(5px); }
        .title { font-size: 50px; color: var(--clr); text-shadow: 0 0 15px var(--clr); margin-bottom: 30px; font-weight: bold; letter-spacing: 4px; }
        .btn-start { padding: 18px 60px; background: var(--clr); color: #000; border: none; font-size: 20px; font-weight: bold; border-radius: 15px; box-shadow: 0 0 20px rgba(0,255,68,0.4); }

        /* Таблица лидеров */
        #leaderboard { display: none; width: 100%; max-width: 350px; padding: 20px; height: 70vh; overflow-y: auto; }
        .entry { display: flex; justify-content: space-between; padding: 12px; background: #0f0f0f; margin-bottom: 6px; border-radius: 10px; border-left: 3px solid var(--clr); }
        .me { border: 1px solid #ff0; background: #1a1a00; }
    </style>
</head>
<body>

<script>
    // МГНОВЕННАЯ ИНИЦИАЛИЗАЦИЯ ДЛЯ TELEGRAM
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
    tg.enableClosingConfirmation();
</script>

<div id="ui-header">
    <div class="tabs">
        <button id="t-game" class="active" onclick="showTab('game')">ИГРА</button>
        <button id="t-top" onclick="showTab('top')">ЛИДЕРЫ</button>
    </div>
    <div style="font-size: 18px;">🐍</div>
</div>

<div id="game-view">
    <div id="stats">
        <div>SCORE: <span id="cur-s">0</span></div>
        <div>BEST: <span id="hi-s">0</span></div>
    </div>
    <canvas id="stage"></canvas>
    <div id="controls">
        <div class="btn-dir" style="grid-area:up" onpointerdown="changeDir(0,-1)">▲</div>
        <div class="btn-dir" style="grid-area:left" onpointerdown="changeDir(-1,0)">◀</div>
        <div class="btn-dir" style="grid-area:right" onpointerdown="changeDir(1,0)">▶</div>
        <div class="btn-dir" style="grid-area:down" onpointerdown="changeDir(0,1)">▼</div>
    </div>
</div>

<div id="leaderboard"></div>

<div id="menu">
    <h1 class="title">SNAKE</h1>
    <button class="btn-start" onclick="initGame()">ИГРАТЬ</button>
</div>

<script>
const API = "https://f141608d-1c6f-48a7-b475-76bfe617af45-00-bg39mkj1p2mv.sisko.replit.dev/api";
const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d");
const COLS = 20;

let CELL, alive = false, score = 0, best = localStorage.getItem('snk_best') || 0;
let snake = [], prevSnake = [], food = {x:5, y:5}, particles = [];
let dir = {x:1, y:0}, nDir = {x:1, y:0};
let lastT = 0, speed = 135;

function resize() {
    const s = Math.min(window.innerWidth - 40, window.innerHeight - 360, 400);
    CELL = Math.floor(s / COLS);
    canvas.width = canvas.height = CELL * COLS;
}

function initGame() {
    document.getElementById('menu').style.display = 'none';
    alive = true; score = 0; dir = {x:1, y:0}; nDir = {x:1, y:0};
    snake = [{x:10, y:10}, {x:9, y:10}, {x:8, y:10}];
    prevSnake = JSON.parse(JSON.stringify(snake));
    document.getElementById('cur-s').textContent = "0";
    spawnFood();
    lastT = performance.now();
    requestAnimationFrame(gameLoop);
}

function spawnFood() {
    food = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*COLS) };
    if(snake.some(s=>s.x===food.x && s.y===food.y)) spawnFood();
}

function changeDir(x, y) {
    if (x !== -dir.x || y !== -dir.y) nDir = {x, y};
    tg.HapticFeedback.selectionChanged();
}

function gameLoop(t) {
    if(!alive) return;
    requestAnimationFrame(gameLoop);
    const dt = t - lastT;
    let p = Math.min(dt / speed, 1);

    if (dt >= speed) {
        prevSnake = JSON.parse(JSON.stringify(snake));
        dir = nDir;
        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
        if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= COLS || snake.some(s=>s.x===head.x && s.y===head.y)) {
            alive = false; return gameOver();
        }
        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
            score++; document.getElementById('cur-s').textContent = score;
            tg.HapticFeedback.impactOccurred('medium');
            for(let i=0; i<6; i++) particles.push({x: food.x*CELL+CELL/2, y: food.y*CELL+CELL/2, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4, l:1});
            spawnFood();
        } else { snake.pop(); }
        lastT = t; p = 0;
    }
    render(p);
}

function render(p) {
    ctx.fillStyle = "#050805";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Сетка
    ctx.strokeStyle = "rgba(0, 255, 68, 0.03)";
    for(let i=0; i<=COLS; i++) {
        ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i*CELL); ctx.lineTo(canvas.width, i*CELL); ctx.stroke();
    }

    // Еда (Неон)
    ctx.shadowBlur = 10; ctx.shadowColor = "#ff3355";
    ctx.fillStyle = "#ff3355";
    ctx.beginPath();
    ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2.5, 0, Math.PI*2);
    ctx.fill();

    // Частицы
    particles.forEach((pt, i) => {
        ctx.fillStyle = `rgba(0, 255, 68, ${pt.l})`;
        ctx.fillRect(pt.x, pt.y, 2, 2);
        pt.x += pt.vx; pt.y += pt.vy; pt.l -= 0.04;
        if(pt.l <= 0) particles.splice(i, 1);
    });

    // Змейка (Плавная интерполяция)
    ctx.shadowColor = "#00ff44";
    snake.forEach((s, i) => {
        const prev = prevSnake[i] || s;
        const x = (prev.x + (s.x - prev.x) * p) * CELL;
        const y = (prev.y + (s.y - prev.y) * p) * CELL;
        ctx.fillStyle = i === 0 ? "#00ff44" : "rgba(0, 255, 68, 0.6)";
        ctx.fillRect(x+1, y+1, CELL-2, CELL-2);
    });
    ctx.shadowBlur = 0;
}

function gameOver() {
    if(score > best) { best = score; localStorage.setItem('snk_best', best); document.getElementById('hi-s').textContent = best; }
    tg.HapticFeedback.notificationOccurred('error');
    document.getElementById('menu').style.display = 'flex';
    fetch(`${API}/score`, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({init_data: tg.initData, score: score}) }).catch(e=>{});
}

function showTab(t) {
    document.getElementById('game-view').style.display = t === 'game' ? 'flex' : 'none';
    document.getElementById('leaderboard').style.display = t === 'top' ? 'block' : 'none';
    document.getElementById('t-game').className = t === 'game' ? 'active' : '';
    document.getElementById('t-top').className = t === 'top' ? 'active' : '';
    if(t === 'top') loadTop();
}

async function loadTop() {
    const list = document.getElementById('leaderboard');
    list.innerHTML = '<p style="text-align:center; opacity:0.5;">Загрузка...</p>';
    try {
        const res = await fetch(`${API}/leaderboard`);
        const data = await res.json();
        list.innerHTML = '<h2 style="color:var(--clr); margin-bottom:15px; text-align:center;">ТОП 10</h2>';
        data.forEach(r => {
            const isMe = tg.initDataUnsafe?.user?.id && String(r.user_id) === String(tg.initDataUnsafe.user.id);
            list.innerHTML += `<div class="entry ${isMe?'me':''}"><span>${r.rank}. ${r.name}</span><b>${r.score}</b></div>`;
        });
    } catch(e) { list.innerHTML = '<p style="text-align:center">Сервер не отвечает</p>'; }
}

// Свайпы
let sx, sy;
document.addEventListener('touchstart', e => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; }, {passive:false});
document.addEventListener('touchmove', e => {
    if(!sx || !sy) return;
    const dx = e.touches[0].clientX - sx, dy = e.touches[0].clientY - sy;
    if(Math.abs(dx)>30 || Math.abs(dy)>30) {
        if(Math.abs(dx)>Math.abs(dy)) changeDir(dx>0?1:-1, 0);
        else changeDir(0, dy>0?1:-1);
        sx = sy = null;
    }
    e.preventDefault();
}, {passive:false});

resize();
document.getElementById('hi-s').textContent = best;
window.addEventListener('resize', resize);
</script>
</body>
</html>
