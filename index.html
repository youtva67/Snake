<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Snake Ultimate Neon: Mini App Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ========================================
           1. CSS ПЕРЕМЕННЫЕ И ОСНОВНЫЕ СТИЛИ
           ========================================
        */
        :root {
            --neon-green: #00ff44;
            --neon-blue: #00ccff;
            --neon-gold: #ffeb3b;
            --neon-pink: #ff00ff;
            --bg-color: #050805;
            --panel-bg: rgba(25, 25, 25, 0.95);
            --border-glow: 0 0 10px rgba(0, 255, 68, 0.3);
            --main-font: 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background: #000;
            background-image: 
                radial-gradient(circle at center, #0a1a0a 0%, #000 100%),
                linear-gradient(to right, rgba(0, 255, 68, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 255, 68, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: #fff;
            font-family: var(--main-font);
            height: 100dvh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            touch-action: none;
        }

        /* ========================================
           2. НАВИГАЦИЯ (ТАБЫ)
           ========================================
        */
        #app-header {
            width: 100%;
            max-width: 450px;
            padding: 15px 20px;
            z-index: 1000;
        }

        .nav-tabs {
            display: flex;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border-radius: 18px;
            padding: 5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }

        .tab-button {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: #666;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-button.active {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 68, 0.4);
        }

        /* ========================================
           3. ИГРОВОЙ ЭКРАН (HUD + CANVAS)
           ========================================
        */
        #game-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            opacity: 1;
            transition: opacity 0.3s;
        }

        #hud-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 400px;
            padding: 10px 20px;
        }

        .stat-box {
            font-family: 'Courier New', monospace;
            color: var(--neon-green);
            font-size: 18px;
            text-shadow: 0 0 8px var(--neon-green);
        }

        #blitz-timer {
            font-size: 22px;
            color: #ffeb3b;
            font-weight: 900;
            display: none;
        }

        .pause-trigger {
            width: 40px;
            height: 40px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
        }

        #stage-container {
            position: relative;
            background: #111;
            border: 2px solid #1a1a1a;
            border-radius: 20px;
            padding: 5px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            background: var(--bg-color);
            border-radius: 15px;
        }

        /* ========================================
           4. УПРАВЛЕНИЕ (КНОПКИ)
           ========================================
        */
        #controller-grid {
            display: grid;
            grid-template-areas: ". up ." "left . right" ". down .";
            gap: 12px;
            margin-top: 20px;
        }

        .joy-key {
            width: 70px;
            height: 70px;
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border: 1px solid #333;
            color: #fff;
            font-size: 24px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .joy-key:active {
            background: var(--neon-green);
            color: #000;
            transform: scale(0.95);
        }

        /* ========================================
           5. ОВЕРЛЕЙ МЕНЮ (ИГРАТЬ / ПАУЗА)
           ========================================
        */
        #menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(10px);
        }

        .close-overlay {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .menu-title {
            font-size: 54px;
            font-weight: 900;
            color: var(--neon-green);
            text-shadow: 0 0 25px var(--neon-green);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .option-label {
            font-size: 12px;
            color: #555;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 800;
        }

        /* СКИНЫ */
        .skin-picker {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .skin-node {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 3px solid #222;
            transition: 0.3s;
        }

        .skin-node.active {
            border-color: #fff;
            transform: scale(1.15);
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        /* РЕЖИМЫ */
        .mode-picker {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
        }

        .mode-btn {
            padding: 12px 20px;
            background: #111;
            border: 1px solid #333;
            color: #777;
            border-radius: 12px;
            font-weight: bold;
            font-size: 13px;
        }

        .mode-btn.active {
            border-color: var(--neon-green);
            color: var(--neon-green);
            background: rgba(0, 255, 68, 0.1);
        }

        .start-btn {
            padding: 20px 80px;
            background: var(--neon-green);
            color: #000;
            border: none;
            font-size: 24px;
            font-weight: 900;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 255, 68, 0.4);
        }

        /* ========================================
           6. ТАБЛИЦА ЛИДЕРОВ
           ========================================
        */
        #top-view {
            display: none;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            height: 75vh;
            overflow-y: auto;
            animation: fadeIn 0.4s ease;
        }

        .leader-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(20, 20, 20, 0.8);
            margin-bottom: 10px;
            border-radius: 15px;
            border-left: 4px solid var(--neon-green);
        }

        .leader-item.me {
            background: rgba(0, 255, 68, 0.1);
            border: 1px solid var(--neon-green);
        }

        .leader-name { font-weight: bold; font-size: 16px; }
        .leader-score { font-size: 18px; font-weight: 900; color: var(--neon-green); }

        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <header id="app-header">
        <nav class="nav-tabs">
            <button id="tab-game-btn" class="tab-button active" onclick="nav('game')">Игра</button>
            <button id="tab-top-btn" class="tab-button" onclick="nav('top')">Топ Мира</button>
        </nav>
    </header>

    <main id="game-view">
        <div id="hud-display">
            <div class="pause-trigger" onclick="pauseGame()">⏸</div>
            <div id="blitz-timer">60s</div>
            <div class="stat-box">СЧЕТ: <span id="cur-score">0</span></div>
            <div class="stat-box" style="font-size: 10px; opacity: 0.5;">РЕКОРД: <span id="hi-score">0</span></div>
        </div>

        <div id="stage-container">
            <canvas id="game-canvas"></canvas>
        </div>

        <div id="controller-grid">
            <button class="joy-key" style="grid-area: up" onpointerdown="sendKey(0,-1)">▲</button>
            <button class="joy-key" style="grid-area: left" onpointerdown="sendKey(-1,0)">◀</button>
            <button class="joy-key" style="grid-area: right" onpointerdown="sendKey(1,0)">▶</button>
            <button class="joy-key" style="grid-area: down" onpointerdown="sendKey(0,1)">▼</button>
        </div>
    </main>

    <section id="top-view">
        <div id="leaderboard-content"></div>
    </section>

    <div id="menu-overlay">
        <div class="close-overlay" onclick="closeMenu()">✕</div>
        <h1 id="menu-header" class="menu-title">SNAKE</h1>
        
        <p class="option-label">ВЫБЕРИ СКИН</p>
        <div class="skin-picker">
            <div class="skin-node active" style="background: var(--neon-green);" data-s="neon" onclick="setSkin('neon')"></div>
            <div class="skin-node" style="background: var(--neon-blue);" data-s="cyber" onclick="setSkin('cyber')"></div>
            <div class="skin-node" style="background: var(--neon-gold);" data-s="gold" onclick="setSkin('gold')"></div>
            <div class="skin-node" style="background: linear-gradient(45deg, #f0f, #00f);" data-s="rgb" onclick="setSkin('rgb')"></div>
        </div>

        <p class="option-label">РЕЖИМ</p>
        <div class="mode-picker">
            <button id="mode-c-btn" class="mode-btn active" onclick="setMode('classic')">КЛАССИКА</button>
            <button id="mode-b-btn" class="mode-btn" onclick="setMode('blitz')">БЛИЦ 60с</button>
        </div>

        <button id="play-btn" class="start-btn" onclick="startGame()">ИГРАТЬ</button>
        <p id="resume-text" style="margin-top:20px; color:#444; font-size:12px; display:none;">Игра на паузе</p>
    </div>

<script>
    /* ========================================
       7. ЛОГИКА ИГРОВОГО ДВИЖКА
       ========================================
    */
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    if(tg.disableVerticalSwipes) tg.disableVerticalSwipes();

    const API = "https://f141608d-1c6f-48a7-b475-76bfe617af45-00-bg39mkj1p2mv.sisko.replit.dev/api";
    const canvas = document.getElementById("game-canvas");
    const ctx = canvas.getContext("2d");
    const GRID = 20;

    let cSize, isRunning = false, isPaused = false, score = 0, best = localStorage.getItem('snk_v3_best') || 0;
    let snake = [], ghost = [], food = {x: 5, y: 5}, fx = [];
    let dir = {x: 1, y: 0}, nextDir = {x: 1, y: 0}, mode = 'classic', timer = 60;
    let lastTime = 0, speed = 135, skin = 'neon', currentTab = 'game';

    const skinMap = {
        neon: { head: '#00ff44', body: 'rgba(0, 255, 68, 0.4)', glow: '#00ff44' },
        cyber: { head: '#00ccff', body: 'rgba(0, 204, 255, 0.4)', glow: '#00ccff' },
        gold: { head: '#ffeb3b', body: 'rgba(255, 235, 59, 0.4)', glow: '#ffeb3b' },
        rgb: { head: '#ff00ff', body: 'rgba(255, 0, 255, 0.4)', glow: '#ff00ff' }
    };

    /** НАВИГАЦИЯ **/
    function nav(target) {
        currentTab = target;
        document.getElementById('tab-game-btn').classList.toggle('active', target === 'game');
        document.getElementById('tab-top-btn').classList.toggle('active', target === 'top');

        if(target === 'top') {
            if(isRunning) isPaused = true;
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('menu-overlay').classList.add('hidden');
            document.getElementById('top-view').style.display = 'block';
            fetchLeaderboard();
        } else {
            document.getElementById('game-view').classList.remove('hidden');
            document.getElementById('top-view').style.display = 'none';
            if(!isRunning || isPaused) showMenu();
        }
    }

    /** МЕНЮ **/
    function showMenu() {
        if(currentTab !== 'game') return;
        document.getElementById('menu-overlay').classList.remove('hidden');
        document.getElementById('menu-header').textContent = isRunning ? "ПАУЗА" : "SNAKE";
        document.getElementById('resume-text').style.display = isRunning ? "block" : "none";
        document.getElementById('play-btn').textContent = isRunning ? "ПРОДОЛЖИТЬ" : "ИГРАТЬ";
    }

    function closeMenu() { document.getElementById('menu-overlay').classList.add('hidden'); }
    function pauseGame() { if(isRunning) { isPaused = true; showMenu(); } }

    /** СКИНЫ И РЕЖИМЫ **/
    function setSkin(s) {
        skin = s;
        document.querySelectorAll('.skin-node').forEach(n => n.classList.toggle('active', n.dataset.s === s));
        document.documentElement.style.setProperty('--neon-green', skinMap[s].head);
    }

    function setMode(m) {
        mode = m;
        document.getElementById('mode-c-btn').classList.toggle('active', m === 'classic');
        document.getElementById('mode-b-btn').classList.toggle('active', m === 'blitz');
    }

    /** СТАРТ **/
    function startGame() {
        closeMenu();
        if(isRunning && isPaused) { isPaused = false; lastTime = performance.now(); requestAnimationFrame(loop); return; }
        
        score = 0; isRunning = true; isPaused = false; timer = 60;
        dir = {x: 1, y: 0}; nextDir = {x: 1, y: 0};
        snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
        ghost = JSON.parse(JSON.stringify(snake));
        
        document.getElementById('cur-score').textContent = "0";
        document.getElementById('blitz-timer').style.display = mode === 'blitz' ? 'block' : 'none';
        
        spawnFood();
        lastTime = performance.now();
        requestAnimationFrame(loop);
    }

    function spawnFood() {
        food = { x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID) };
        if(snake.some(s => s.x === food.x && s.y === food.y)) spawnFood();
    }

    function sendKey(x, y) {
        if (x !== -dir.x || y !== -dir.y) nextDir = {x, y};
        if(tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
    }

    /** ЦИКЛ ИГРЫ **/
    function loop(ts) {
        if(!isRunning || isPaused || currentTab !== 'game') return;
        requestAnimationFrame(loop);
        
        const delta = ts - lastTime;
        let p = Math.min(delta / speed, 1);

        if (delta >= speed) {
            ghost = JSON.parse(JSON.stringify(snake));
            dir = nextDir;
            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

            if(mode === 'blitz') {
                timer -= (speed/1000);
                document.getElementById('blitz-timer').textContent = Math.ceil(timer) + 's';
                if(timer <= 0) return gameOver();
            }

            if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID || 
                snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score++;
                document.getElementById('cur-score').textContent = score;
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                for(let i=0; i<8; i++) fx.push({x: food.x*cSize+cSize/2, y: food.y*cSize+cSize/2, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5, a:1});
                spawnFood();
            } else { snake.pop(); }
            lastTime = ts; p = 0;
        }
        draw(p);
    }

    function draw(p) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const s = skinMap[skin];

        // Фон-сетка
        ctx.strokeStyle = "rgba(0, 255, 68, 0.05)";
        for(let i=0; i<=GRID; i++){
            ctx.beginPath(); ctx.moveTo(i*cSize, 0); ctx.lineTo(i*cSize, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i*cSize); ctx.lineTo(canvas.width, i*cSize); ctx.stroke();
        }

        // Еда
        ctx.shadowBlur = 15; ctx.shadowColor = "#ff3355"; ctx.fillStyle = "#ff3355";
        ctx.beginPath(); ctx.arc(food.x*cSize+cSize/2, food.y*cSize+cSize/2, cSize/2.5, 0, Math.PI*2); ctx.fill();

        // Частицы
        fx.forEach((pt, i) => {
            ctx.shadowBlur = 0; ctx.fillStyle = `rgba(0,255,68,${pt.a})`;
            ctx.fillRect(pt.x, pt.y, 2, 2);
            pt.x += pt.vx; pt.y += pt.vy; pt.a -= 0.04;
            if(pt.a <= 0) fx.splice(i, 1);
        });

        // Змейка
        ctx.shadowBlur = 12; ctx.shadowColor = s.glow;
        snake.forEach((seg, i) => {
            const prev = ghost[i] || seg;
            const x = (prev.x + (seg.x - prev.x)*p)*cSize;
            const y = (prev.y + (seg.y - prev.y)*p)*cSize;
            ctx.fillStyle = (skin === 'rgb') ? `hsl(${(Date.now()/10 + i*15)%360}, 100%, 50%)` : (i === 0 ? s.head : s.body);
            ctx.beginPath(); ctx.roundRect(x+1.5, y+1.5, cSize-3, cSize-3, 5); ctx.fill();
        });
        ctx.shadowBlur = 0;
    }

    function gameOver() {
        isRunning = false;
        if(score > best) { best = score; localStorage.setItem('snk_v3_best', best); document.getElementById('hi-score').textContent = best; }
        if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        showMenu();
        if(tg.initData) {
            fetch(`${API}/score`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ init_data: tg.initData, score: score })
            }).catch(() => {});
        }
    }

    /** ЛИДЕРБОРД (ТОП) **/
    async function fetchLeaderboard() {
        const container = document.getElementById('leaderboard-content');
        container.innerHTML = '<p style="text-align:center; opacity:0.5; padding-top:50px;">Загрузка чемпионов...</p>';
        try {
            const res = await fetch(`${API}/leaderboard`);
            const data = await res.json();
            container.innerHTML = '<h2 style="text-align:center; margin-bottom:25px; color:var(--neon-green); font-size:28px;">HALL OF FAME</h2>';
            data.forEach(player => {
                const isMe = tg.initDataUnsafe?.user?.id && String(player.user_id) === String(tg.initDataUnsafe.user.id);
                container.innerHTML += `
                    <div class="leader-item ${isMe ? 'me' : ''}">
                        <div class="leader-name">${player.rank}. ${player.name}</div>
                        <div class="leader-score">${player.score}</div>
                    </div>
                `;
            });
        } catch(e) { container.innerHTML = '<p style="text-align:center; color:#ff3355;">Сервер не отвечает</p>'; }
    }

    /** ИНИЦИАЛИЗАЦИЯ И УПРАВЛЕНИЕ **/
    function resize() {
        const dim = Math.min(window.innerWidth - 40, window.innerHeight - 380, 400);
        cSize = Math.floor(dim / GRID);
        canvas.width = canvas.height = cSize * GRID;
    }

    let startX, startY;
    document.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }, {passive: false});
    document.addEventListener('touchmove', e => {
        if (!startX || !startY) return;
        const dx = e.touches[0].clientX - startX, dy = e.touches[0].clientY - startY;
        if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
            if (Math.abs(dx) > Math.abs(dy)) sendKey(dx > 0 ? 1 : -1, 0);
            else sendKey(0, dy > 0 ? 1 : -1);
            startX = startY = null;
        }
        e.preventDefault();
    }, {passive: false});

    window.addEventListener('resize', resize);
    resize();
    document.getElementById('hi-score').textContent = best;

    // Скроем меню при первом запуске, чтобы пользователь мог переключиться в ТОП
    // Но если он на вкладке "Игра", покажем меню для выбора режима.
    showMenu();

</script>
</body>
</html>
