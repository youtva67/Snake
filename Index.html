<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Snake</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      font-family: 'Courier New', monospace;
      color: #0f0;
      overflow: hidden;
      user-select: none;
    }

    #scoreboard {
      display: flex;
      gap: 32px;
      margin-bottom: 12px;
      font-size: 14px;
      letter-spacing: 2px;
    }

    #scoreboard span { color: #fff; font-size: 18px; font-weight: bold; }

    canvas {
      background: #111;
      border: 2px solid #0f0;
      display: block;
      touch-action: none;
    }

    #dpad {
      display: grid;
      grid-template-areas: ". up ." "left . right" ". down .";
      gap: 6px;
      margin-top: 16px;
    }

    #dpad button {
      width: 56px;
      height: 56px;
      background: #111;
      border: 2px solid #0f0;
      color: #0f0;
      font-size: 22px;
      cursor: pointer;
      border-radius: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    #dpad button:active { background: #0f0; color: #000; }
    #dpad button[data-d="up"]    { grid-area: up; }
    #dpad button[data-d="left"]  { grid-area: left; }
    #dpad button[data-d="right"] { grid-area: right; }
    #dpad button[data-d="down"]  { grid-area: down; }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    #overlay h1 { font-size: 36px; color: #0f0; letter-spacing: 4px; }
    #overlay .sub { font-size: 20px; color: #fff; }
    #overlay .rec { font-size: 15px; color: #ff0; }

    #overlay button {
      margin-top: 8px;
      padding: 14px 40px;
      background: #0f0;
      color: #000;
      border: none;
      font-size: 18px;
      font-family: inherit;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 6px;
    }

    #overlay button:active { opacity: 0.8; }
  </style>
</head>
<body>

<div id="scoreboard">
  СЧЁТ:&nbsp;<span id="score">0</span>
  &nbsp;&nbsp;
  РЕКОРД:&nbsp;<span id="best">0</span>
</div>

<canvas id="game"></canvas>

<div id="dpad">
  <button data-d="up">▲</button>
  <button data-d="left">◀</button>
  <button data-d="right">▶</button>
  <button data-d="down">▼</button>
</div>

<div id="overlay">
  <h1>🐍 SNAKE</h1>
  <button onclick="startGame()">ИГРАТЬ</button>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const canvas = document.getElementById("game");
const ctx    = canvas.getContext("2d");
const COLS = 20, ROWS = 20;

let CELL, loop, score, best, snake, food, dir, nextDir, alive, touchStart;

best = Number(localStorage.getItem("snake_best") || 0);
document.getElementById("best").textContent = best;

function resize() {
  const maxW = Math.min(window.innerWidth  - 16, 400);
  const maxH = Math.min(window.innerHeight - 200, 400);
  CELL = Math.floor(Math.min(maxW, maxH) / COLS);
  canvas.width  = CELL * COLS;
  canvas.height = CELL * ROWS;
}
resize();
window.addEventListener("resize", () => { resize(); if (!alive) drawFrame(); });

function spawnFood() {
  for (let i = 0; i < 400; i++) {
    const f = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    if (!snake.some(s => s.x === f.x && s.y === f.y)) return f;
  }
  return { x: 0, y: 0 };
}

function drawFrame() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "rgba(0,255,0,0.07)";
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, canvas.height); ctx.stroke();
  }
  for (let j = 0; j <= ROWS; j++) {
    ctx.beginPath(); ctx.moveTo(0, j*CELL); ctx.lineTo(canvas.width, j*CELL); ctx.stroke();
  }

  ctx.fillStyle = "red";
  ctx.fillRect(food.x*CELL+2, food.y*CELL+2, CELL-4, CELL-4);

  for (let i = snake.length - 1; i >= 0; i--) {
    const s = snake[i];
    if (i === 0) {
      ctx.fillStyle = alive ? "#00ff88" : "#ff4444";
    } else {
      const t = 1 - (i / snake.length) * 0.55;
      ctx.fillStyle = `rgba(0,${Math.floor(210*t)},${Math.floor(80*t)},1)`;
    }
    ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
  }
}

function step() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    alive = false;
    clearInterval(loop);
    tg?.HapticFeedback?.notificationOccurred("error");
    const nb = Math.max(best, score);
    if (nb > best) { best = nb; localStorage.setItem("snake_best", best); }
    document.getElementById("best").textContent = best;
    drawFrame();
    showGameOver();
    return;
  }

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById("score").textContent = score;
    food = spawnFood();
    tg?.HapticFeedback?.impactOccurred("light");
  } else {
    snake.pop();
  }
  drawFrame();
}

function startGame() {
  document.getElementById("overlay").style.display = "none";
  clearInterval(loop);
  snake   = [{ x: 10, y: 10 }];
  food    = spawnFood();
  dir     = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score   = 0;
  alive   = true;
  document.getElementById("score").textContent = 0;
  drawFrame();
  loop = setInterval(step, 150);
}

function showGameOver() {
  const ov = document.getElementById("overlay");
  ov.innerHTML = `
    <h1>💀 КОНЕЦ</h1>
    <div class="sub">Счёт: ${score}</div>
    ${score > 0 && score >= best ? '<div class="rec">🎉 Новый рекорд!</div>' : ''}
    <button onclick="startGame()">ЕЩЁ РАЗ</button>
  `;
  ov.style.display = "flex";
}

function setDir(dx, dy) {
  if (!alive) return;
  if (snake.length > 1 && dx === -dir.x && dy === -dir.y) return;
  nextDir = { x: dx, y: dy };
}

document.querySelectorAll("#dpad button").forEach(btn => {
  const map = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
  const [dx, dy] = map[btn.dataset.d];
  btn.addEventListener("pointerdown", e => { e.preventDefault(); setDir(dx, dy); });
});

document.addEventListener("keydown", e => {
  const map = {
    ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0],
    w:[0,-1], s:[0,1], a:[-1,0], d:[1,0],
  };
  if (map[e.key]) { e.preventDefault(); setDir(...map[e.key]); }
});

canvas.addEventListener("touchstart", e => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });

canvas.addEventListener("touchend", e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  Math.abs(dx) > Math.abs(dy) ? setDir(dx > 0 ? 1 : -1, 0) : setDir(0, dy > 0 ? 1 : -1);
}, { passive: true });

drawFrame();
</script>

</body>
</html>
